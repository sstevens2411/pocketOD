                            <span class="badge badge-brand-${bc}">${lens.brand}</span>
                            <span class="badge badge-modality">${lens.modality}</span>
                            <span class="badge badge-dk">Dk ${lens.dk}</span>
                        </div>
                        <div class="lens-name">${lens.name}</div>
                        ${lens.note ? `<div class="lens-note">${lens.note}</div>` : ""}
                    </div>
                    <div>
                        <div class="lens-price">~${lens.price}</div>
                        <div class="lens-qty">Qty: ${lens.qty}</div>
                        <div class="lens-qty" style="color:var(--success);font-weight:600">${formatYearlyCost(lens)}</div>
                    </div>
                </div>
                <div class="lens-specs">${specsHtml}</div>
                <button class="lens-select-btn" onclick="selectLens('${lens.name.replace(/'/g, "\\'")}')" >Select</button>
            </div>`;
        }

        function setSort(s) {
            if (state.sortBy === s) {
                state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
            } else {
                state.sortBy = s;
                // Default: price/name/brand start ascending, dk starts descending (highest first)
                state.sortDir = s === "dk" ? "desc" : "asc";
            }
            render();
        }

        // LENS SELECTION & ORDER PARAMETERS
        function selectLens(name) {
            state.selectedLens = name;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function deselectLens() {
            state.selectedLens = null;
            state.troubleshoot = null;
            state.tsAdjustment = null;
            state.tsRotation = null;
            state.nonAdaptFrom = null;
            render();
        }

        function snapTo025(val) {
            return Math.round(val * 4) / 4;
        }

        function snapCyl(patientCyl, lens) {
            // Always prefer one step LOWER cylinder (less minus) than Rx,
            // then compensate sphere with spherical equivalent.
            const absCyl = Math.abs(patientCyl);
            const absMin = Math.abs(lens.cylMin);
            const absMax = Math.abs(lens.cylMax);

            // Use fixed cylinder steps if lens specifies them
            const steps = [];
            if (lens.cylSteps) {
                lens.cylSteps.forEach(s => steps.push(Math.abs(s)));
            } else {
                for (let s = absMin; s <= absMax + 0.01; s += 0.50) {
                    steps.push(Math.round(s * 100) / 100);
                }
            }

            if (steps.length === 0) return 0;

            // Find the step one lower than patient cyl (less cylinder)
            // Filter to steps <= patient cyl magnitude, then pick the highest one
            const lowerSteps = steps.filter(s => s <= absCyl - 0.01);
            if (lowerSteps.length > 0) {
                return -lowerSteps[lowerSteps.length - 1];
            }

            // If no lower step available (patient cyl is at or below minimum), use nearest
            let best = steps[0];
            let bestDiff = Math.abs(absCyl - steps[0]);
            for (const s of steps) {
                const diff = Math.abs(absCyl - s);
                if (diff < bestDiff) {
                    best = s;
                    bestDiff = diff;
                }
            }

            return -best;
        }

        function snapAxis(patientAxis, lens) {
            if (!lens.axes) return parseInt(patientAxis) || 180;

            const stepMatch = lens.axes.match(/(\d+)\u00B0\s*steps/i);
            const step = stepMatch ? parseInt(stepMatch[1]) : 10;
            const ax = parseInt(patientAxis) || 180;

            const snapped = Math.round(ax / step) * step;
            if (snapped === 0) return 180;
            if (snapped > 180) return 180;
            return snapped;
        }

        function suggestAddType(addPower, addTypes) {
            if (!addTypes || addTypes.length === 0) return null;

            const add = parseFloat(addPower) || 0;

            if (addTypes.length === 3) {
                if (add <= 1.25) return addTypes[0];
                if (add <= 2.00) return addTypes[1];
                return addTypes[2];
            }

            if (addTypes.length === 2) {
                if (add <= 1.75) return addTypes[0];
                return addTypes[1];
            }

            return addTypes[0];
        }

        function renderOrderDetail() {
            const lens = LENSES.find(l => l.name === state.selectedLens);

            if (!lens) {
                state.selectedLens = null;
                return renderResultsStep();
            }

            let odOk = isLensCompatibleWithEye(lens, state.od);
            let osOk = isLensCompatibleWithEye(lens, state.os);

            // In non-adapt mode, check SE compatibility instead
            if (state.nonAdaptFrom) {
                const odSph = parseFloat(state.od.sphere) || 0;
                const odCyl = parseFloat(state.od.cylinder) || 0;
                const odSE = snapTo025(vertexConvert(odSph) + odCyl / 2);
                odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;

                const osSph = parseFloat(state.os.sphere) || 0;
                const osCyl = parseFloat(state.os.cylinder) || 0;
                const osSE = snapTo025(vertexConvert(osSph) + osCyl / 2);
                osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
            }

            const bc = brandClass(lens.brand);
            const brandColor = { alcon:"var(--alcon)", bl:"var(--bl)", cv:"var(--cv)", jj:"var(--jj)" }[bc];

            // Build order params for one eye
            function buildEyeParams(eye, isDominant, eyeLabel) {
                const sph = parseFloat(eye.sphere) || 0;
                const cyl = parseFloat(eye.cylinder) || 0;
                const addP = parseFloat(eye.add) || 0;
                let clSph = snapTo025(vertexConvert(sph));
                const vertexApplied = Math.abs(sph) >= 4;
                const foldCyl = cyl !== 0 && (lens.type === "sphere" || lens.type === "multifocal");

                // SE adjustment: fold cyl into sphere for non-toric lenses
                if (foldCyl) {
                    clSph = snapTo025(clSph + cyl / 2);
                }

                let params = [];
                let finalSph = clSph;
                const notes = [];
                if (vertexApplied) notes.push(`Vertexed from ${sph > 0 ? "+" : ""}${sph.toFixed(2)}`);
                if (foldCyl) notes.push(`SE: ${cyl.toFixed(2)} cyl folded in`);
                let sphNote = notes.length > 0 ? notes.join("; ") : null;
                let sphHighlight = vertexApplied || foldCyl;

                if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylDiff = clCyl - cyl;
                    if (Math.abs(cylDiff) > 0.01) {
                        const seAdj = snapTo025(-cylDiff / 2);
                        finalSph = snapTo025(clSph + seAdj);
                        const parts = [];
                        if (vertexApplied) parts.push(`Vertexed from ${sph > 0 ? "+" : ""}${sph.toFixed(2)}`);
                        parts.push(`SE adjusted ${seAdj > 0 ? "+" : ""}${seAdj.toFixed(2)} for cyl reduction`);
                        sphNote = parts.join("; ");
                        sphHighlight = true;
                    }
                }

                params.push({
                    label: "Sphere (SPH)",
                    value: `${finalSph > 0 ? "+" : ""}${finalSph.toFixed(2)}`,
                    note: sphNote,
                    highlight: sphHighlight
                });

                if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylChanged = clCyl !== cyl;
                    params.push({
                        label: "Cylinder (CYL)",
                        value: clCyl.toFixed(2),
                        note: cylChanged ? `Reduced from Rx ${cyl.toFixed(2)}` : null,
                        highlight: cylChanged
                    });

                    const rxAxis = eye.cylSign === '+' ? eye.transposedAxis : eye.axis;
                    const clAxis = snapAxis(rxAxis, lens);
                    const axisChanged = clAxis !== (parseInt(rxAxis) || 180);
                    params.push({
                        label: "Axis",
                        value: `${clAxis}\u00B0`,
                        note: axisChanged ? `Snapped from ${rxAxis}\u00B0` : null,
                        highlight: axisChanged
                    });
                }

                if (lens.type === "multifocal" || lens.type === "multifocal-toric") {
                    if (lens.fittingGuide && lens.fittingGuide.addTable) {
                        const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                        if (row && isDominant !== null) {
                            const design = isDominant ? row.dominant : row.nonDominant;
                            const designDesc = design === 'D' ? 'Distance-center' : design === 'N' ? 'Near-center' : design;
                            const addValue = design === 'D' || design === 'N' ? `${row.clAdd} ${design}` : design;
                            params.push({
                                label: "Add",
                                value: addValue,
                                note: `${isDominant ? 'Dominant Eye' : 'Non-dominant Eye'} \u00B7 ${designDesc}`,
                                highlight: true
                            });
                        } else if (row) {
                            params.push({
                                label: "Add",
                                value: row.clAdd,
                                note: `Spec add +${addP.toFixed(2)} \u00B7 Select dominant eye for recommendation`,
                                highlight: true
                            });
                        } else {
                            const addType = suggestAddType(addP, lens.addTypes);
                            params.push({
                                label: "Add",
                                value: addType || `+${addP.toFixed(2)}`,
                                note: addType ? `Based on +${addP.toFixed(2)} add power` : null,
                                highlight: true
                            });
                        }
                    } else {
                        const addType = suggestAddType(addP, lens.addTypes);
                        params.push({
                            label: "Add",
                            value: addType || `+${addP.toFixed(2)}`,
                            note: addType ? `Based on +${addP.toFixed(2)} add power` : null,
                            highlight: true
                        });
                    }
                }

                // Apply troubleshoot adjustments
                if (state.tsAdjustment && state.tsAdjustment.overrides[eyeLabel]) {
                    const adj = state.tsAdjustment.overrides[eyeLabel];
                    if (adj.sphDelta !== undefined) {
                        const sphParam = params.find(p => p.label === "Sphere (SPH)");
                        if (sphParam) {
                            const oldVal = parseFloat(sphParam.value);
                            const newVal = snapTo025(oldVal + adj.sphDelta);
                            sphParam.note = (sphParam.note ? sphParam.note + "; " : "") + `Adjusted ${adj.sphDelta > 0 ? "+" : ""}${adj.sphDelta.toFixed(2)}`;
                            sphParam.value = `${newVal > 0 ? "+" : ""}${newVal.toFixed(2)}`;
                            sphParam.highlight = true;
                        }
                    }
                    if (adj.addOverride !== undefined) {
                        const addParam = params.find(p => p.label === "Add");
                        if (addParam) {
                            addParam.value = adj.addOverride;
                            addParam.note = (addParam.note ? addParam.note + "; " : "") + "Adjusted for troubleshoot";
                            addParam.highlight = true;
                        }
                    }
                    if (adj.designOverride !== undefined) {
                        const addParam = params.find(p => p.label === "Add");
                        if (addParam) {
                            addParam.value = addParam.value.replace(/ [DN]$/, ` ${adj.designOverride}`);
                            const desc = adj.designOverride === 'D' ? 'Distance-center' : 'Near-center';
                            addParam.note = `${isDominant ? 'Dominant Eye' : 'Non-dominant Eye'} \u00B7 ${desc} (adjusted)`;
                            addParam.highlight = true;
                        }
                    }
                    if (adj.axisOverride !== undefined) {
                        const axisParam = params.find(p => p.label === "Axis");
                        if (axisParam) {
                            axisParam.note = `Rotation compensated from ${axisParam.value}`;
                            axisParam.value = `${adj.axisOverride}\u00B0`;
                            axisParam.highlight = true;
                        }
                    }
                }

                return { params, vertexApplied };
            }

            // Determine dominant status per eye: OD = right, OS = left
            const odDominant = state.dominantEye === 'right' ? true : state.dominantEye === 'left' ? false : null;
            const osDominant = state.dominantEye === 'left' ? true : state.dominantEye === 'right' ? false : null;

            let eyeSectionsHtml = '';
            const notes = [];

            if (odOk) {
                const { params, vertexApplied } = buildEyeParams(state.od, odDominant, "OD");
                const html = params.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                    <div class="order-param-label">${p.label}</div>
                    <div class="order-param-value">${p.value}</div>
                    ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
                </div>`).join("");
                eyeSectionsHtml += `<div class="order-section-title">OD (Right Eye) \u2014 Order Parameters</div>
                    <div class="order-grid">${html}</div>`;
                if (vertexApplied) notes.push("Vertex conversion applied at 12mm vertex distance.");
            }

            if (osOk) {
                const { params, vertexApplied } = buildEyeParams(state.os, osDominant, "OS");
                const html = params.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                    <div class="order-param-label">${p.label}</div>
                    <div class="order-param-value">${p.value}</div>
                    ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
                </div>`).join("");
                eyeSectionsHtml += `<div class="order-section-title">OS (Left Eye) \u2014 Order Parameters</div>
                    <div class="order-grid">${html}</div>`;
                if (vertexApplied && !notes.includes("Vertex conversion applied at 12mm vertex distance.")) notes.push("Vertex conversion applied at 12mm vertex distance.");
            }

            // Shared lens specs
            const bcs = lens.bc.split("/").map(s => s.trim());
            let sharedParams = [];
            sharedParams.push({
                label: "Base Curve",
                value: bcs.length > 1 ? bcs[0] : lens.bc,
                note: bcs.length > 1 ? `Also available: ${bcs[1]}` : null
            });
            sharedParams.push({
                label: "Diameter",
                value: lens.diam
            });
            const sharedHtml = sharedParams.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                <div class="order-param-label">${p.label}</div>
                <div class="order-param-value">${p.value}</div>
                ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
            </div>`).join("");

            if (bcs.length > 1) notes.push(`This lens comes in ${bcs.length} base curves. Trial fit may determine optimal BC.`);

            let notesHtml = "";
            if (notes.length) {
                notesHtml = `<div class="order-note-box"><strong>\u26A0 Notes:</strong> ${notes.join(" ")}</div>`;
            }

            const yearlyCost = formatYearlyCost(lens);
            const infoItems = [
                { label: "Modality", value: lens.modality },
                { label: "Dk/t", value: lens.dk },
                { label: "Wear", value: lens.wear },
                { label: "Pack Sizes", value: lens.qty },
                { label: "Price/Pack", value: "~" + lens.price },
                ...(yearlyCost ? [{ label: "Annual Cost", value: `${yearlyCost}` }] : []),
            ];

            const infoHtml = infoItems.map(i => `<div class="order-info-item">
                <div class="order-info-label">${i.label}</div>
                <div class="order-info-value">${i.value}</div>
            </div>`).join("");

            const isAdjusted = state.tsAdjustment !== null;
            const isNonAdapt = state.nonAdaptFrom !== null;
            const adjBanner = isAdjusted ? `<div class="order-note-box" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success)"><strong>Adjusted Order:</strong> ${state.tsAdjustment.title}</div>` : '';
            const nonAdaptBanner = isNonAdapt ? `<div class="order-note-box" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success)"><strong>Non-Adapt Conversion:</strong> Cylinder folded into sphere via spherical equivalent</div>` : '';

            return `<div class="order-detail">
                ${isNonAdapt
                    ? `<button class="order-back-btn" onclick="backToNonAdapt()">\u2190 Back to Troubleshooting</button>`
                    : isAdjusted
                    ? `<button class="order-back-btn" onclick="backToTroubleshoot()">\u2190 Back to Troubleshooting</button>`
                    : `<button class="order-back-btn" onclick="deselectLens()">\u2190 Back to Results</button>`}
                <div class="order-lens-name">${lens.name}</div>
                <div class="order-lens-brand" style="color:${brandColor}">${lens.brand}</div>

                ${adjBanner}${nonAdaptBanner}

                ${eyeSectionsHtml}

                <div class="order-section-title">Lens Specifications</div>
                <div class="order-grid">${sharedHtml}</div>

                ${notesHtml}

                <div class="order-section-title">Lens Details</div>
                <div class="order-lens-info">${infoHtml}</div>

                ${isAdjusted || isNonAdapt || lens.type === 'sphere' ? '' : `<button class="troubleshoot-btn" onclick="openTroubleshoot()">&#x1F50D; Troubleshoot Vision</button>`}
            </div>`;
        }

        // TROUBLESHOOT
        function openTroubleshoot() {
            state.troubleshoot = "select";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backFromTroubleshoot() {
            state.troubleshoot = null;
            state.tsRotation = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function applyTsAdjustment(index) {
            const s = window._tsSuggestions[index];
            if (!s) return;
            state.tsAdjustment = { title: s.title, overrides: s.adjustments, complaint: state.troubleshoot };
            state.troubleshoot = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backToTroubleshoot() {
            const complaint = state.tsAdjustment ? state.tsAdjustment.complaint : "select";
            state.tsAdjustment = null;
            state.troubleshoot = complaint || "select";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function setTroubleshoot(complaint) {
            state.troubleshoot = state.troubleshoot === complaint ? "select" : complaint;
            state.tsRotation = null;
            render();
        }

        function setRotationDir(eyeLabel, dir) {
            if (!state.tsRotation || !state.tsRotation[eyeLabel]) return;
            state.tsRotation[eyeLabel].dir = state.tsRotation[eyeLabel].dir === dir ? null : dir;
            render();
        }

        function setRotationDeg(eyeLabel, deg) {
            if (!state.tsRotation || !state.tsRotation[eyeLabel]) return;
            state.tsRotation[eyeLabel].deg = state.tsRotation[eyeLabel].deg === deg ? null : deg;
            render();
        }

        function applyRotationAdjustment() {
            if (!window._tsRotationAdj) return;
            state.tsAdjustment = { ...window._tsRotationAdj, complaint: state.troubleshoot };
            state.troubleshoot = null;
            state.tsRotation = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function getNonAdaptLenses() {
            const results = [];
            LENSES.forEach(lens => {
                if (lens.type === "toric" || lens.type === "multifocal-toric" || lens.type === "myopia-mgmt") return;
                if (state.modality.length > 0 && !state.modality.includes(lens.modality)) return;
                if (!state.brands.includes(lens.brand)) return;

                let odOk = false, osOk = false;

                const odSph = parseFloat(state.od.sphere) || 0;
                const odCyl = parseFloat(state.od.cylinder) || 0;
                const odAdd = parseFloat(state.od.add) || 0;
                const odSE = snapTo025(vertexConvert(odSph) + odCyl / 2);
                if (odAdd > 0 && lens.type === "multifocal") {
                    odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;
                } else if (!odAdd && lens.type === "sphere") {
                    odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;
                }

                const osSph = parseFloat(state.os.sphere) || 0;
                const osCyl = parseFloat(state.os.cylinder) || 0;
                const osAdd = parseFloat(state.os.add) || 0;
                const osSE = snapTo025(vertexConvert(osSph) + osCyl / 2);
                if (osAdd > 0 && lens.type === "multifocal") {
                    osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
                } else if (!osAdd && lens.type === "sphere") {
                    osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
                }

                if (odOk || osOk) {
                    results.push({ ...lens, forOD: odOk, forOS: osOk });
                }
            });

            const dir = state.sortDir === "asc" ? 1 : -1;
            return results.sort((a, b) => {
                if (state.sortBy === "dk") return (a.dk - b.dk) * dir;
                if (state.sortBy === "brand") return a.brand.localeCompare(b.brand) * dir;
                if (state.sortBy === "name") return a.name.localeCompare(b.name) * dir;
                if (state.sortBy === "price") {
                    const va = calcYearlyCost(a) || 99999;
                    const vb = calcYearlyCost(b) || 99999;
                    return (va - vb) * dir;
                }
                return 0;
            });
        }

        function selectNonAdaptLens(name) {
            state.nonAdaptFrom = state.selectedLens;
            state.selectedLens = name;
            state.troubleshoot = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backToNonAdapt() {
            state.selectedLens = state.nonAdaptFrom;
            state.nonAdaptFrom = null;
            state.troubleshoot = 'nonadapt';
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function renderTroubleshootStep() {
            const lens = LENSES.find(l => l.name === state.selectedLens);
            if (!lens) {
                state.troubleshoot = null;
                state.selectedLens = null;
                return renderResultsStep();
            }

            const bc = brandClass(lens.brand);
            const brandColor = { alcon:"var(--alcon)", bl:"var(--bl)", cv:"var(--cv)", jj:"var(--jj)" }[bc];
            const odOk = isLensCompatibleWithEye(lens, state.od);
            const osOk = isLensCompatibleWithEye(lens, state.os);
            const odDominant = state.dominantEye === 'right' ? true : state.dominantEye === 'left' ? false : null;
            const osDominant = state.dominantEye === 'left' ? true : state.dominantEye === 'right' ? false : null;

            function getCurrentSph(eye) {
                const sph = parseFloat(eye.sphere) || 0;
                const cyl = parseFloat(eye.cylinder) || 0;
                let clSph = snapTo025(vertexConvert(sph));
                if (cyl !== 0 && Math.abs(cyl) === 0.50) {
                    clSph = snapTo025(clSph + cyl / 2);
                } else if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylDiff = clCyl - cyl;
                    if (Math.abs(cylDiff) > 0.01) {
                        const seAdj = snapTo025(-cylDiff / 2);
                        clSph = snapTo025(clSph + seAdj);
                    }
                }
                return clSph;
            }

            function getCurrentAdd(eye, isDominant) {
                const addP = parseFloat(eye.add) || 0;
                if (lens.type !== "multifocal" && lens.type !== "multifocal-toric") return null;
                if (lens.fittingGuide && lens.fittingGuide.addTable) {
                    const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                    if (row && isDominant !== null) return isDominant ? row.dominant : row.nonDominant;
                    if (row) return row.clAdd;
                }
                return suggestAddType(addP, lens.addTypes);
            }

            let _tsSuggestions = [];

            const isToric = lens.type === "toric" || lens.type === "multifocal-toric";

            // Check if non-adapt option should show (toric lens, all compatible eyes cyl ≤ 1.25)
            const odCylAbs = Math.abs(parseFloat(state.od.cylinder) || 0);
            const osCylAbs = Math.abs(parseFloat(state.os.cylinder) || 0);
            const maxCyl = Math.max(odOk ? odCylAbs : 0, osOk ? osCylAbs : 0);
            const showNonAdapt = isToric && maxCyl > 0 && maxCyl <= 1.25;

            // Complaint selection cards
            let complaintHtml = `
                <div style="margin-bottom:20px">
                    <div class="order-section-title">Select Vision Complaint</div>
                    <div class="option-grid">
                        <div class="option-btn ${state.troubleshoot === 'distance' ? 'active' : ''}" onclick="setTroubleshoot('distance')">
                            <div class="icon">&#x1F50D;</div>
                            <div class="title">Blurry at Distance</div>
                            <div class="desc">Difficulty seeing far away</div>
                        </div>
                        <div class="option-btn ${state.troubleshoot === 'near' ? 'active' : ''}" onclick="setTroubleshoot('near')">
                            <div class="icon">&#x1F4D6;</div>
                            <div class="title">Blurry at Near</div>
                            <div class="desc">Difficulty reading or close work</div>
                        </div>
                        ${isToric ? `<div class="option-btn ${state.troubleshoot === 'rotation' ? 'active' : ''}" onclick="setTroubleshoot('rotation')">
                            <div class="icon">&#x1F504;</div>
                            <div class="title">Lens Rotation</div>
                            <div class="desc">Toric lens rotating on eye</div>
                        </div>` : ''}
                        ${showNonAdapt ? `<div class="option-btn ${state.troubleshoot === 'nonadapt' ? 'active' : ''}" onclick="setTroubleshoot('nonadapt')">
                            <div class="icon">&#x1F504;</div>
                            <div class="title">Non-Adapt to Toric</div>
                            <div class="desc">Convert to spherical equivalent</div>
                        </div>` : ''}
                    </div>
                </div>`;

            let suggestionsHtml = '';

            if (state.troubleshoot === 'distance' || state.troubleshoot === 'near') {
                const isDistance = state.troubleshoot === 'distance';
                const suggestions = [];

                const eyes = [];
                if (odOk) eyes.push({ eye: state.od, label: "OD", isDominant: odDominant });
                if (osOk) eyes.push({ eye: state.os, label: "OS", isDominant: osDominant });

                const sphAdj = isDistance ? -0.25 : +0.25;
                const sphAdjLabel = isDistance ? "\u22120.25D" : "+0.25D";

                // Determine primary eye for adjustment
                let primaryEye = null;
                let secondaryEye = null;

                if (eyes.length >= 2) {
                    if (isDistance) {
                        primaryEye = eyes.find(e => e.isDominant === true);
                        secondaryEye = eyes.find(e => e.isDominant === false);
                    } else {
                        primaryEye = eyes.find(e => e.isDominant === false);
                        secondaryEye = eyes.find(e => e.isDominant === true);
                    }
                }

                if (primaryEye && secondaryEye) {
                    const currentSph = getCurrentSph(primaryEye.eye);
                    const newSph = snapTo025(currentSph + sphAdj);
                    suggestions.push({
                        title: `Add ${sphAdjLabel} to ${primaryEye.label} sphere`,
                        rationale: `Adjust ${primaryEye.isDominant ? 'dominant' : 'non-dominant'} eye first`,
                        adjustments: { [primaryEye.label]: { sphDelta: sphAdj } },
                        changes: [{
                            eye: primaryEye.label, param: "Sphere",
                            from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                            to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}`
                        }]
                    });

                    const current2 = getCurrentSph(secondaryEye.eye);
                    const new2 = snapTo025(current2 + sphAdj);
                    suggestions.push({
                        title: `Add ${sphAdjLabel} to both eyes`,
                        rationale: `If single-eye adjustment is insufficient`,
                        adjustments: { [primaryEye.label]: { sphDelta: sphAdj }, [secondaryEye.label]: { sphDelta: sphAdj } },
                        changes: [
                            { eye: primaryEye.label, param: "Sphere",
                              from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                              to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}` },
                            { eye: secondaryEye.label, param: "Sphere",
                              from: `${current2 > 0 ? "+" : ""}${current2.toFixed(2)}`,
                              to: `${new2 > 0 ? "+" : ""}${new2.toFixed(2)}` }
                        ]
                    });
                } else {
                    eyes.forEach(e => {
                        const currentSph = getCurrentSph(e.eye);
                        const newSph = snapTo025(currentSph + sphAdj);
                        suggestions.push({
                            title: `Add ${sphAdjLabel} to ${e.label} sphere`,
                            rationale: isDistance ? 'More minus power for distance clarity' : 'More plus power for near clarity',
                            adjustments: { [e.label]: { sphDelta: sphAdj } },
                            changes: [{
                                eye: e.label, param: "Sphere",
                                from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                                to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}`
                            }]
                        });
                    });
                }

                // Add power suggestions for multifocal lenses
                if (lens.type === "multifocal" || lens.type === "multifocal-toric") {
                    const addTypes = lens.addTypes;
                    if (addTypes && addTypes.length > 1) {
                        eyes.forEach(e => {
                            const currentAdd = getCurrentAdd(e.eye, e.isDominant);
                            if (!currentAdd) return;
                            const currentIdx = addTypes.indexOf(currentAdd);
                            if (currentIdx === -1) return;

                            if (isDistance && currentIdx > 0) {
                                const newAdd = addTypes[currentIdx - 1];
                                suggestions.push({
                                    title: `Lower ${e.label} add power`,
                                    rationale: `Reduce add from ${currentAdd} to ${newAdd} for clearer distance`,
                                    adjustments: { [e.label]: { addOverride: newAdd } },
                                    changes: [{ eye: e.label, param: "Add", from: currentAdd, to: newAdd }]
                                });
                            }
                            if (!isDistance && currentIdx < addTypes.length - 1) {
                                const newAdd = addTypes[currentIdx + 1];
                                suggestions.push({
                                    title: `Increase ${e.label} add power`,
                                    rationale: `Increase add from ${currentAdd} to ${newAdd} for clearer near`,
                                    adjustments: { [e.label]: { addOverride: newAdd } },
                                    changes: [{ eye: e.label, param: "Add", from: currentAdd, to: newAdd }]
                                });
                            }
                        });
                    }

                    // D/N design swaps for MF-toric with fitting guide
                    if (lens.fittingGuide && lens.fittingGuide.addTable) {
                        eyes.forEach(e => {
                            const addP = parseFloat(e.eye.add) || 0;
                            const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                            if (!row || e.isDominant === null) return;
                            const currentDesign = e.isDominant ? row.dominant : row.nonDominant;

                            if (isDistance && currentDesign === 'N') {
                                suggestions.push({
                                    title: `Switch ${e.label} to Distance design`,
                                    rationale: `Change ${e.isDominant ? 'dominant' : 'non-dominant'} eye from Near-center to Distance-center`,
                                    adjustments: { [e.label]: { designOverride: "D" } },
                                    changes: [{ eye: e.label, param: "Design", from: "N (Near-center)", to: "D (Distance-center)" }]
                                });
                            }
                            if (!isDistance && currentDesign === 'D') {
                                suggestions.push({
                                    title: `Switch ${e.label} to Near design`,
                                    rationale: `Change ${e.isDominant ? 'dominant' : 'non-dominant'} eye from Distance-center to Near-center`,
                                    adjustments: { [e.label]: { designOverride: "N" } },
                                    changes: [{ eye: e.label, param: "Design", from: "D (Distance-center)", to: "N (Near-center)" }]
                                });
                            }
                        });
                    }
                }

                // Build suggestions HTML
                _tsSuggestions = suggestions;
                window._tsSuggestions = _tsSuggestions;
                if (suggestions.length > 0) {
                    suggestionsHtml = `<div class="order-section-title">${isDistance ? 'Distance' : 'Near'} Vision Adjustments</div>`;
                    suggestionsHtml += suggestions.map((s, i) => {
                        const changesHtml = s.changes.map(c =>
                            `<div class="ts-change">
                                <span class="ts-change-eye">${c.eye}</span>
                                <span class="ts-change-param">${c.param}:</span>
                                <span class="ts-change-from">${c.from}</span>
                                <span class="ts-change-arrow">\u2192</span>
                                <span class="ts-change-to">${c.to}</span>
                            </div>`
                        ).join("");
                        return `<div class="troubleshoot-suggestion fade-in">
                            <div class="ts-step">${i + 1}</div>
                            <div class="ts-body">
                                <div class="ts-title">${s.title}</div>
                                <div class="ts-rationale">${s.rationale}</div>
                                <div class="ts-changes">${changesHtml}</div>
                                <button class="lens-select-btn" style="margin-top:10px;font-size:12px;padding:7px 14px" onclick="applyTsAdjustment(${i})">View Adjusted Results \u2192</button>
                            </div>
                        </div>`;
                    }).join("");
                } else {
                    suggestionsHtml = `<div style="padding:20px;text-align:center;color:var(--ink-muted);font-size:13px">
                        No additional adjustments available for this lens type.
                    </div>`;
                }
            }

            if (state.troubleshoot === 'rotation' && isToric) {
                if (!state.tsRotation) {
                    state.tsRotation = {};
                    if (odOk) state.tsRotation.OD = { dir: null, deg: null };
                    if (osOk) state.tsRotation.OS = { dir: null, deg: null };
                }

                function normalizeAxis(ax) {
                    ax = ax % 180;
                    if (ax <= 0) ax += 180;
                    return ax;
                }

                let rotationHtml = '';
                const eyeEntries = [];
                if (odOk) eyeEntries.push({ eye: state.od, label: "OD", name: "OD (Right Eye)" });
                if (osOk) eyeEntries.push({ eye: state.os, label: "OS", name: "OS (Left Eye)" });

                eyeEntries.forEach(e => {
                    const rot = state.tsRotation[e.label];
                    if (!rot) return;
                    const currentAxis = snapAxis(e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis, lens);

                    let resultHtml = '';
                    if (rot.dir && rot.deg) {
                        const delta = rot.dir === 'left' ? rot.deg : -rot.deg;
                        const newAxis = normalizeAxis(currentAxis + delta);
                        resultHtml = `<div class="vertex-box fade-in" style="margin-top:12px">
                            <div class="vertex-label">Adjusted Axis</div>
                            <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)">
                                ${currentAxis}\u00B0 \u2192 ${newAxis}\u00B0
                            </div>
                            <div style="margin-top:4px;font-size:11px;color:var(--ink-muted)">
                                Rotated ${rot.deg}\u00B0 ${rot.dir} \u00B7 LARS compensation
                            </div>
                        </div>`;
                    }

                    rotationHtml += `
                        <div class="eye-section">
                            <div class="eye-header">${e.name}</div>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Current Axis</label>
                                    <div style="font-family:var(--mono);font-size:18px;font-weight:700;padding:11px 0">${currentAxis}\u00B0</div>
                                </div>
                                <div class="form-group">
                                    <label>Direction</label>
                                    <div class="input-row" style="gap:6px">
                                        <button type="button" class="dom-toggle ${rot.dir === 'left' ? 'active-left' : ''}" style="flex:1" onclick="setRotationDir('${e.label}','left')">\u2190 Left</button>
                                        <button type="button" class="dom-toggle ${rot.dir === 'right' ? 'active-right' : ''}" style="flex:1" onclick="setRotationDir('${e.label}','right')">Right \u2192</button>
                                    </div>
                                </div>
                                <div class="form-group" style="grid-column:1/-1">
                                    <label>Degrees Rotated</label>
                                    <div class="input-row" style="gap:6px">
                                        <button type="button" class="dom-toggle ${rot.deg === 10 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',10)">10\u00B0</button>
                                        <button type="button" class="dom-toggle ${rot.deg === 20 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',20)">20\u00B0</button>
                                        <button type="button" class="dom-toggle ${rot.deg === 30 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',30)">30\u00B0</button>
                                    </div>
                                </div>
                            </div>
                            ${resultHtml}
                        </div>`;
                });

                const hasSelection = eyeEntries.some(e => {
                    const rot = state.tsRotation[e.label];
                    return rot && rot.dir && rot.deg;
                });

                let viewBtnHtml = '';
                if (hasSelection) {
                    const overrides = {};
                    const parts = [];
                    eyeEntries.forEach(e => {
                        const rot = state.tsRotation[e.label];
                        if (rot && rot.dir && rot.deg) {
                            const currentAxis = snapAxis(e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis, lens);
                            const delta = rot.dir === 'left' ? rot.deg : -rot.deg;
                            overrides[e.label] = { axisOverride: normalizeAxis(currentAxis + delta) };
                            parts.push(`${e.label}: ${rot.deg}\u00B0 ${rot.dir}`);
                        }
                    });
                    window._tsRotationAdj = { title: `Axis rotation: ${parts.join(', ')}`, overrides };
                    viewBtnHtml = `<button class="lens-select-btn" style="margin-top:16px;width:100%;justify-content:center" onclick="applyRotationAdjustment()">View Adjusted Results \u2192</button>`;
                }

                suggestionsHtml = rotationHtml + viewBtnHtml;
            }

            // NON-ADAPT TO TORIC
            if (state.troubleshoot === 'nonadapt') {
                const eyeEntries = [];
                if (odOk) eyeEntries.push({ eye: state.od, label: "OD", name: "OD (Right Eye)" });
                if (osOk) eyeEntries.push({ eye: state.os, label: "OS", name: "OS (Left Eye)" });

                // SE conversion summary
                let seHtml = '<div class="vertex-box fade-in" style="margin-bottom:20px"><div class="vertex-label">Spherical Equivalent Conversion</div>';
                eyeEntries.forEach(e => {
                    const sph = parseFloat(e.eye.sphere) || 0;
                    const cyl = parseFloat(e.eye.cylinder) || 0;
                    const clSph = vertexConvert(sph);
                    const seSph = snapTo025(clSph + cyl / 2);
                    const sphStr = `${clSph > 0 ? "+" : ""}${clSph.toFixed(2)}`;
                    const cylStr = `${cyl.toFixed(2)}`;
                    const seStr = `${seSph > 0 ? "+" : ""}${seSph.toFixed(2)}`;
                    const seAxis = e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis;
                    seHtml += `<div style="margin-top:8px"><strong>${e.label}:</strong> <span style="font-family:var(--mono)">${sphStr} ${cylStr}${seAxis ? ` x ${seAxis}\u00B0` : ''}</span> \u2192 <span style="font-family:var(--mono);font-weight:700;color:var(--accent)">${seStr} (sphere)</span></div>`;
                });
                seHtml += '</div>';

                // Find compatible non-toric lenses
                const nonAdaptLenses = getNonAdaptLenses();
                let listHtml;
                if (nonAdaptLenses.length === 0) {
                    listHtml = `<div class="empty"><div class="empty-icon">\uD83D\uDD0D</div><div class="empty-title">No spherical lenses match this SE prescription</div><div class="empty-desc">Try expanding your brand or modality selection</div></div>`;
                } else {
                    listHtml = `<div class="lens-list">${nonAdaptLenses.map(l => renderLensCard(l).replace(/selectLens\(/g, 'selectNonAdaptLens(')).join("")}</div>`;
                }

                suggestionsHtml = `${seHtml}
                    <div class="results-header"><div>
                        <div class="results-count">${nonAdaptLenses.length} Compatible Spherical Lens${nonAdaptLenses.length !== 1 ? 'es' : ''}</div>
                    </div></div>
                    ${listHtml}`;
            }

            return `<div class="order-detail">
                <button class="order-back-btn" onclick="backFromTroubleshoot()">\u2190 Back to Results</button>
                <div class="order-lens-name">${lens.name}</div>
                <div class="order-lens-brand" style="color:${brandColor}">${lens.brand}</div>
                ${complaintHtml}
                ${suggestionsHtml}
            </div>`;
        }

        // NAVIGATION
        function goBack() {
            if (state.step > 0) {
                state.selectedLens = null;
                state.troubleshoot = null;
                state.tsAdjustment = null;
                state.tsRotation = null;
                state.step--;
                render();
            }
        }

        function goNext() {
            if (state.step === 3) {
                state = {
                    step: 0,
                    od: newEye(),
                    os: newEye(),
                    dominantEye: null,
                    modality: [],
                    brands: [...BRANDS],
                    selectedLens: null,
                    troubleshoot: null,
                    tsAdjustment: null,
                    tsRotation: null,
                    nonAdaptFrom: null,
                    sortBy: "dk",
                    sortDir: "desc"
                };
                render();
                return;
            }

            // sphere always has a value from dropdown

            if (state.step < 3) {
                if (state.step === 1) {
                    state.brands = getBrandsWithResults();
                    if (state.brands.length === 0) state.brands = [...BRANDS];
                }
                state.step++;
                if (state.step === 3) {
                    const lenses = getCompatibleLenses();
                    if (lenses.length === 1) {
                        state.selectedLens = lenses[0].name;
                    }
                }
                render();
            }
        }

        function resetAll() {
            state = {
                step: 0,
                od: newEye(),
                os: newEye(),
                dominantEye: null,
                modality: [],
                brands: [...BRANDS],
                selectedLens: null,
                troubleshoot: null,
                tsAdjustment: null,
                tsRotation: null,
                nonAdaptFrom: null,
                sortBy: "dk",
                sortDir: "desc"
            };
            switchTab('lenses');
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function goToStep(i) {
            if (i <= state.step) {
                state.step = i;
                render();
            }
        }

        function switchTab(tab) {
            document.getElementById('subnavLenses').classList.toggle('active', tab === 'lenses');
            document.getElementById('subnavMeds').classList.toggle('active', tab === 'meds');
            if (tab === 'lenses') {
                document.querySelector('.main').style.display = '';
                document.getElementById('medsPage').style.display = 'none';
            } else {
                document.querySelector('.main').style.display = 'none';
                document.getElementById('medsPage').style.display = '';
                renderMeds();
            }
        }

        // ===== MEDICATIONS TAB =====

        function renderMeds() {
            const el = document.getElementById('medsContent');
            const activeId = document.activeElement ? document.activeElement.id : null;
            let html = '';
            html += renderMedPrescribingAid();
            html += `<div class="med-footer">Pricing is approximate cash pricing without insurance. Always verify current pricing and clinical appropriateness before prescribing.</div>`;
            el.innerHTML = html;
            bindMedEvents();
            if (activeId) {
                const restore = document.getElementById(activeId);
                if (restore) { restore.focus(); restore.setSelectionRange(restore.value.length, restore.value.length); }
            }
        }

        function getMedLookupResults() {
            let results = MEDS;
            if (medsState.showFavoritesOnly) {
                results = results.filter(m => medsState.favorites.includes(m.id));
            }
            if (medsState.searchQuery.trim()) {
                const q = medsState.searchQuery.trim().toLowerCase();
                results = results.filter(m =>
                    m.brand_name.toLowerCase().includes(q) ||
                    m.generic_name.toLowerCase().includes(q) ||
                    m.drug_class.toLowerCase().includes(q)
                );
            }
            return results;
        }

        function getMedAutocomplete(query) {
            if (!query || query.length < 2) return [];
            const q = query.toLowerCase();
            return MEDS.filter(m =>
                m.brand_name.toLowerCase().includes(q) ||
                m.generic_name.toLowerCase().includes(q)
            ).slice(0, 8);
        }

        // === Prescribing Aid ===

        function renderMedPrescribingAid() {
            let html = '';

            if (medsState.paStep === 0) {
                html += renderMedConditionStep();
            } else {
                html += renderMedFilterStep();
            }

            return html;
        }

        function renderMedConditionStep() {
            let html = `<div class="med-search-wrap">
                <span class="med-search-icon">\uD83D\uDD0D</span>
                <input type="text" class="med-search-input" id="medSearchInput" placeholder="Search by brand or generic name\u2026" value="${escMedHtml(medsState.searchQuery)}" autocomplete="off">
                <div class="med-autocomplete" id="medAutocomplete" style="display:none"></div>
            </div>`;
            // Favorites chip
            html += `<div class="med-filter-chips">
                <button class="med-filter-chip ${medsState.showFavoritesOnly?'active':''}" onclick="toggleMedFavoritesOnly()">\u2605 Favorites${medsState.favorites.length ? ' ('+medsState.favorites.length+')' : ''}</button>
            </div>`;
            if (medsState.showFavoritesOnly) {
                const favResults = MEDS.filter(m => medsState.favorites.includes(m.id));
                html += `<div class="results-header"><div><div class="results-count">${favResults.length} Favorite${favResults.length!==1?'s':''}</div></div></div>`;
                if (favResults.length === 0) {
                    html += `<div class="empty"><div class="empty-icon">\uD83D\uDC8A</div><div class="empty-title">No favorites yet</div><div class="empty-desc">Star medications to add them here.</div></div>`;
                } else {
                    html += `<div class="lens-list" style="margin-bottom:16px">`;
                    favResults.forEach(med => { html += renderMedCard(med, false); });
                    html += `</div>`;
                }
                return html;
            }
            if (medsState.searchQuery.trim().length >= 2) {
                const results = getMedLookupResults();
                if (results.length > 0) {
                    html += `<div class="results-header"><div><div class="results-count">${results.length} Result${results.length!==1?'s':''}</div></div></div>`;
                    html += `<div class="lens-list" style="margin-bottom:16px">`;
                    results.forEach(med => { html += renderMedCard(med, false); });
                    html += `</div>`;
                    return html;
                }
            }
            html += `<div class="card" style="margin-bottom:16px"><div class="card-title">What are you looking for?</div><div class="card-desc">Select a condition to find appropriate medications.</div>`;
            html += `<div class="option-grid" style="grid-template-columns: 1fr 1fr 1fr;">`;
            MED_CONDITION_GROUPS.forEach(g => {
                const count = MEDS.filter(m => g.conditions.includes(m.condition)).length;
                const active = medsState.selectedConditionGroup === g.id;
                html += `<div class="option-btn ${active ? 'active' : ''} ${count===0?'zero':''}" onclick="selectMedCondition('${g.id}')">
                    <div class="icon">${g.icon}</div>
                    <div class="title">${g.label}</div>
                    <div class="count">${count} med${count!==1?'s':''}</div>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderMedFilterStep() {
            const group = MED_CONDITION_GROUPS.find(g => g.id === medsState.selectedConditionGroup);
            if (!group) return '';
            const allMeds = MEDS.filter(m => group.conditions.includes(m.condition));
            let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                <button class="order-back-btn" onclick="goMedBack()" style="margin-bottom:0;flex-shrink:0">\u2190 Back</button>
                <div><div class="card-title" style="margin-bottom:0">${group.icon} ${escMedHtml(group.label)}</div></div>
            </div>`;
            html += `<div class="card" style="margin-bottom:16px">`;

            // Category search bar
            html += `<div class="med-search-wrap" style="margin-bottom:12px">
                <span class="med-search-icon">\uD83D\uDD0D</span>
                <input type="text" class="med-search-input" id="medCategorySearch" placeholder="Search within ${escMedHtml(group.label)}\u2026" value="${escMedHtml(medsState.categorySearch)}" autocomplete="off">
            </div>`;

            // Sub-condition chips for grouped conditions
            if (group.conditions.length > 1) {
                html += `<div class="med-subcondition-section"><div class="med-subcondition-label">Type</div><div class="med-filter-chips">`;
                html += `<button class="med-filter-chip ${medsState.filters.subCondition===null?'active':''}" onclick="toggleMedSubCondition(null)">All</button>`;
                group.conditions.forEach(c => {
                    const info = MED_CONDITIONS[c];
                    const cnt = MEDS.filter(m => m.condition === c).length;
                    html += `<button class="med-filter-chip ${medsState.filters.subCondition===c?'active':''}" onclick="toggleMedSubCondition('${c}')">${info.icon} ${info.label} (${cnt})</button>`;
                });
                html += `</div></div>`;
            }

            // All filter chips in one row
            html += `<div class="med-filter-chips">`;
            const drugClasses = [...new Set(allMeds.map(m => m.drug_class))];
            if (drugClasses.length > 1) {
                const sorted = drugClasses.map(dc => ({ dc, color: getDrugClassColor(dc) })).sort((a, b) => a.color.order - b.color.order);
                html += `<button class="med-filter-chip ${medsState.filters.drugClass===null?'active':''}" onclick="toggleMedDrugClass(null)">All</button>`;
                sorted.forEach(({ dc, color }) => {
                    const cnt = allMeds.filter(m => m.drug_class === dc).length;
                    const active = medsState.filters.drugClass === dc;
                    html += `<button class="med-filter-chip ${color.cls} ${active?'active':''}" onclick="toggleMedDrugClass(this.dataset.dc)" data-dc="${escMedHtml(dc)}"><span class="dc-dot ${color.dot}"></span>${escMedHtml(shortenDrugClass(dc))} (${cnt})</button>`;
                });
            }
            html += `<button class="med-filter-chip ${medsState.filters.genericOnly?'active':''}" onclick="toggleMedFilter('genericOnly')">Generic available</button>`;
            html += `<button class="med-filter-chip ${medsState.filters.preservativeFree?'active':''}" onclick="toggleMedFilter('preservativeFree')">Preservative-free</button>`;
            html += `</div>`;


            html += `</div>`;

            // Medication list
            const filtered = getMedFilteredResults();
            html += `<div class="results-header" style="margin-top:16px"><div><div class="results-count">${filtered.length} Medication${filtered.length!==1?'s':''}</div></div></div>`;
            if (filtered.length === 0) {
                html += `<div class="empty"><div class="empty-icon">\uD83D\uDC8A</div><div class="empty-title">No medications match</div><div class="empty-desc">Try adjusting your filters</div></div>`;
            } else {
                html += `<div class="lens-list">`;
                filtered.forEach(med => { html += renderMedCard(med, true); });
                html += `</div>`;
            }
            return html;
        }

        function getMedFilteredResults() {
            const group = MED_CONDITION_GROUPS.find(g => g.id === medsState.selectedConditionGroup);
            if (!group) return [];
            let results = MEDS.filter(m => group.conditions.includes(m.condition));
            if (medsState.categorySearch.trim()) {
                const q = medsState.categorySearch.trim().toLowerCase();
                results = results.filter(m =>
                    m.brand_name.toLowerCase().includes(q) ||
                    m.generic_name.toLowerCase().includes(q) ||
                    m.drug_class.toLowerCase().includes(q)
                );
            }
            if (medsState.filters.subCondition) {
                results = results.filter(m => m.condition === medsState.filters.subCondition);
            }
            if (medsState.filters.drugClass) {
                results = results.filter(m => m.drug_class === medsState.filters.drugClass);
            }
            if (medsState.filters.genericOnly) {
                results = results.filter(m => m.generic_available);
            }
            if (medsState.filters.preservativeFree) {
                results = results.filter(m => m.preservative_free);
            }
            if (medsState.filters.maxPrice !== null) {
                const allMeds = MEDS.filter(m => group.conditions.includes(m.condition));
                const prices = allMeds.map(m => m.avg_generic_price || m.avg_brand_price).filter(Boolean);
                const maxP = Math.max(...prices);
                if (medsState.filters.maxPrice < maxP) {
                    results = results.filter(m => {
                        const price = m.avg_generic_price || m.avg_brand_price;
                        return price <= medsState.filters.maxPrice;
                    });
                }
            }
            // Sort: first_line first, then by cheapest effective price
            results.sort((a, b) => {
                if (a.tier !== b.tier) return a.tier === 'first_line' ? -1 : 1;
                const pa = a.avg_generic_price || a.avg_brand_price;
                const pb = b.avg_generic_price || b.avg_brand_price;
                return pa - pb;
            });
            return results;
        }

        // === Shared Med Card ===

        function renderMedCard(med, condensed) {
            const isFav = medsState.favorites.includes(med.id);
            const isExpanded = medsState.expandedCards[med.id];
            const isArtificialTear = /artificial tear|lubricant/i.test(med.drug_class);
            const tierClass = isArtificialTear ? 'otc-tear' : (med.tier === 'first_line' ? 'first-line' : 'second-line');
            const tierLabel = isArtificialTear ? 'OTC' : (med.tier === 'first_line' ? 'First-Line' : 'Second-Line');
            const condInfo = MED_CONDITIONS[med.condition];

            const dcColor = getDrugClassColor(med.drug_class);
            let html = `<div class="med-card ${condensed ? 'med-card-condensed' : ''} ${isExpanded ? 'expanded' : ''}" ${condensed ? 'onclick="toggleMedExpand(\''+med.id+'\')"' : ''}>`;
            html += `<div class="tier-stripe" style="background:${getDrugClassHex(med.drug_class)}"></div>`;

            // Top row: info + prices + fav button
            html += `<div class="med-top-row">`;
            html += `<div class="med-info">`;
            // Badges
            html += `<div class="badges">`;
            html += `<span class="badge badge-${tierClass}">${tierLabel}</span>`;
            html += `<span class="badge badge-condition">${condInfo ? condInfo.label : med.condition}</span>`;
            if (med.preservative_free) html += `<span class="badge badge-pf">PF</span>`;
            if (med.generic_available) html += `<span class="badge badge-generic">Generic</span>`;
            html += `</div>`;
            // Names
            html += `<div class="med-brand-name">${escMedHtml(med.brand_name)}</div>`;
            html += `<div class="med-generic-name">${escMedHtml(med.generic_name)}</div>`;
            html += `<div class="med-drug-class">${escMedHtml(med.drug_class)}</div>`;
            html += `</div>`;
            // Prices (right side)
            html += `<div class="med-price-side">`;
            html += `<div class="med-price-col"><div class="med-price-label">Brand</div><div class="med-price-value">$${formatMedPrice(med.avg_brand_price)}</div></div>`;
            if (med.avg_generic_price !== null) {
                const savings = Math.round((1 - med.avg_generic_price / med.avg_brand_price) * 100);
                html += `<div class="med-price-col"><div class="med-price-label">Generic</div><div class="med-price-value">$${formatMedPrice(med.avg_generic_price)}</div>`;
                if (savings > 0) html += `<div class="med-price-savings">Save ${savings}%</div>`;
                html += `</div>`;
            } else {
                html += `<div class="med-price-col"><div class="med-price-label">Generic</div><div class="med-price-value" style="color:var(--ink-muted);font-size:12px">N/A</div></div>`;
            }
            html += `</div>`;
            // Fav button
            html += `<button class="med-fav-btn ${isFav?'favorited':''}" onclick="event.stopPropagation();toggleMedFavorite('${med.id}')" title="${isFav?'Remove from favorites':'Add to favorites'}">${isFav?'\u2605':'\u2606'}</button>`;
            html += `</div>`;

            if (condensed) {
                html += `<div class="med-expand-hint">Tap for details</div>`;
            }

            // Expanded content
            html += `<div class="${condensed ? 'med-expanded-content' : ''}">`;

            // Dosing
            html += `<div class="med-dosing"><span class="med-dosing-label">Dosing: </span>${escMedHtml(med.typical_dosing)}</div>`;
            html += `<div class="med-bottle">Size: ${escMedHtml(med.bottle_size)}</div>`;

            // Notes
            if (med.notes) {
                const notesOpen = medsState.expandedNotes[med.id];
                html += `<button class="med-notes-toggle" onclick="event.stopPropagation();toggleMedNotes('${med.id}')">${notesOpen ? '\u25BC Hide Notes' : '\u25B6 Clinical Notes'}</button>`;
                if (notesOpen) {
                    html += `<div class="med-notes-content">${escMedHtml(med.notes)}</div>`;
                }
            }

            // Copy Rx
            html += `<button class="med-copy-btn" id="copyBtn_${med.id}" onclick="event.stopPropagation();copyMedRx('${med.id}')">\uD83D\uDCCB Copy Rx</button>`;

            html += `</div>`; // end expanded content
            html += `</div>`; // end med-card
            return html;
        }

        function formatMedPrice(price) {
            if (price === null || price === undefined) return 'N/A';
            return price % 1 === 0 ? price.toLocaleString() : price.toFixed(2);
        }

        function getDrugClassHex(dc) {
            const d = dc.toLowerCase();
            if (/prostaglandin/.test(d)) return '#2dd4bf';
            if (/beta.blocker/.test(d)) return '#eab308';
            if (/carbonic anhydrase|^cai/.test(d)) return '#f97316';
            if (/alpha/.test(d)) return '#a855f7';
            if (/rho kinase|rock/.test(d)) return '#6b7280';
            if (/miotic|parasympathomimetic/.test(d)) return '#16a34a';
            if (/combination|aminoglycoside/.test(d)) return '#1e3a8a';
            if (/artificial tear|lubricant|lipid/.test(d)) return '#3b82f6';
            if (/fluoroquinolone/.test(d)) return '#ef4444';
            if (/macrolide/.test(d)) return '#ec4899';
            if (/antiviral/.test(d)) return '#8b5cf6';
            if (/antifungal/.test(d)) return '#78716c';
            if (/corticosteroid/.test(d)) return '#f97316';
            if (/nsaid/.test(d)) return '#eab308';
            if (/antihistamine|mast cell/.test(d)) return '#a855f7';
            if (/anti.vegf|bispecific/.test(d)) return '#0ea5e9';
            if (/cycloplegic|mydriatic/.test(d)) return '#16a34a';
            if (/decongestant/.test(d)) return '#6366f1';
            if (/immunomodulator|calcineurin/.test(d)) return '#2dd4bf';
            if (/lfa/.test(d)) return '#2dd4bf';
            if (/nicotinic/.test(d)) return '#2dd4bf';
            return '#9ca3af';
        }

        function getDrugClassColor(dc) {
            const d = dc.toLowerCase();
            if (/prostaglandin/.test(d)) return { cls: 'dc-pga', dot: 'dc-dot-pga', order: 1 };
            if (/beta.blocker/.test(d)) return { cls: 'dc-beta', dot: 'dc-dot-beta', order: 2 };
            if (/carbonic anhydrase|^cai/.test(d)) return { cls: 'dc-cai', dot: 'dc-dot-cai', order: 3 };
            if (/alpha/.test(d)) return { cls: 'dc-alpha', dot: 'dc-dot-alpha', order: 4 };
            if (/rho kinase|rock/.test(d)) return { cls: 'dc-rock', dot: 'dc-dot-rock', order: 5 };
            if (/miotic|parasympathomimetic/.test(d)) return { cls: 'dc-miotic', dot: 'dc-dot-miotic', order: 6 };
            if (/combination|aminoglycoside/.test(d)) return { cls: 'dc-combo', dot: 'dc-dot-combo', order: 7 };
            return { cls: '', dot: '', order: 99 };
        }

        function shortenDrugClass(dc) {
            return dc
                .replace(/ \(topical\)/i, '')
                .replace(/ \(low potency\)/i, '')
                .replace(/ \(moderate potency\)/i, '')
                .replace(/ \(low-moderate potency\)/i, '')
                .replace(/ \(high potency\)/i, '')
                .replace(/ \(low dose\)/i, '')
                .replace(/ \(long-acting\)/i, '')
                .replace(/ \(oral nucleoside analog\)/i, ' (oral)')
                .replace(/ \(nucleoside analog\)/i, '')
                .replace(/ \(polyene\)/i, '')
                .replace(/ \(sympathomimetic\)/i, '')
                .replace(/ \(2nd generation\)/i, '')
                .replace(/ \(4th generation\)/i, '')
                .replace(/Calcineurin inhibitor \/ Immunomodulator/i, 'Immunomodulator')
                .replace(/Aminoglycoside antibiotic \/ Corticosteroid combination/i, 'Antibiotic / Steroid')
                .replace(/Combination antibiotic \/ Corticosteroid/i, 'Antibiotic / Steroid')
                .replace(/Antihistamine \/ Mast cell stabilizer/i, 'Antihistamine / Mast cell')
                .replace(/Alpha-2 adrenergic agonist/i, 'Alpha-2 agonist')
                .replace(/Carbonic anhydrase inhibitor/i, 'CAI')
                .replace(/Nicotinic acetylcholine receptor agonist/i, 'nAChR agonist')
                .replace(/Lipid-enhanced artificial tear/i, 'Lipid-enhanced tear')
                .replace(/Lipid-based artificial tear/i, 'Lipid-based tear')
                .replace(/Artificial tear \/ Lubricant/i, 'Artificial tear')
                .replace(/Bispecific anti-VEGF \/ anti-Ang-2/i, 'Anti-VEGF / Ang-2')
                .replace(/Cycloplegic \/ Mydriatic/i, 'Cycloplegic / Mydriatic')
                .replace(/Mydriatic \/ Short-acting cycloplegic/i, 'Short-acting mydriatic')
                .replace(/Miotic \/ Parasympathomimetic/i, 'Miotic');
        }

        function escMedHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // === Navigation ===

        function goMedStep(i) {
            if (i < medsState.paStep) {
                medsState.paStep = i;
                renderMeds();
            }
        }

        function goMedNext() {
            if (medsState.paStep === 0 && medsState.selectedConditionGroup !== null) {
                medsState.paStep = 1;
            }
            renderMeds();
        }

        function goMedBack() {
            if (medsState.paStep > 0) {
                medsState.paStep = 0;
                medsState.categorySearch = "";
                renderMeds();
            }
        }

        function selectMedCondition(groupId) {
            medsState.selectedConditionGroup = groupId;
            medsState.filters = { genericOnly:false, preservativeFree:false, drugClass:null, maxPrice:null, subCondition:null };
            medsState.categorySearch = "";
            medsState.paStep = 1;
            renderMeds();
        }

        function toggleMedFilter(key) {
            medsState.filters[key] = !medsState.filters[key];
            renderMeds();
        }

        function toggleMedSubCondition(condId) {
            medsState.filters.subCondition = condId;
            renderMeds();
        }

        function toggleMedDrugClass(dc) {
            medsState.filters.drugClass = dc;
            renderMeds();
        }

        function toggleMedExpand(medId) {
            medsState.expandedCards[medId] = !medsState.expandedCards[medId];
            renderMeds();
        }

        function toggleMedNotes(medId) {
            medsState.expandedNotes[medId] = !medsState.expandedNotes[medId];
            renderMeds();
        }

        // === Events ===

        let medAcIndex = -1;

        function bindMedEvents() {
            const input = document.getElementById('medSearchInput');
            if (input) {
                input.addEventListener('input', handleMedSearch);
                input.addEventListener('keydown', handleMedSearchKeydown);
                input.addEventListener('focus', function() { if (this.value.length >= 2) updateMedAutocomplete(); });
            }
            const catSearch = document.getElementById('medCategorySearch');
            if (catSearch) {
                catSearch.addEventListener('input', function(e) {
                    medsState.categorySearch = e.target.value;
                    renderMeds();
                });
            }

            document.addEventListener('click', function(e) {
                const ac = document.getElementById('medAutocomplete');
                const input = document.getElementById('medSearchInput');
                if (ac && input && !ac.contains(e.target) && e.target !== input) {
                    ac.style.display = 'none';
                }
            });
        }

        function handleMedSearch(e) {
            medsState.searchQuery = e.target.value;
            medAcIndex = -1;
            updateMedAutocomplete();
            // Update results below search
            const el = document.getElementById('medsContent');
            if (el) renderMeds();
        }

        function handleMedSearchKeydown(e) {
            const ac = document.getElementById('medAutocomplete');
            if (!ac || ac.style.display === 'none') return;
            const items = ac.querySelectorAll('.med-autocomplete-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                medAcIndex = Math.min(medAcIndex + 1, items.length - 1);
                highlightAcItem(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                medAcIndex = Math.max(medAcIndex - 1, -1);
                highlightAcItem(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (medAcIndex >= 0 && items[medAcIndex]) {
                    items[medAcIndex].click();
                } else {
                    ac.style.display = 'none';
                }
            } else if (e.key === 'Escape') {
                ac.style.display = 'none';
                medAcIndex = -1;
            }
        }

        function highlightAcItem(items) {
            items.forEach((it, i) => it.classList.toggle('highlighted', i === medAcIndex));
        }

        function updateMedAutocomplete() {
            const ac = document.getElementById('medAutocomplete');
            if (!ac) return;
            const matches = getMedAutocomplete(medsState.searchQuery);
            if (matches.length === 0) {
                ac.style.display = 'none';
                return;
            }
            ac.style.display = '';
            ac.innerHTML = matches.map((m, i) => {
                return `<div class="med-autocomplete-item ${i===medAcIndex?'highlighted':''}" onclick="selectMedFromAutocomplete('${m.id}')">
                    <div class="ac-brand">${highlightMatch(m.brand_name, medsState.searchQuery)}</div>
                    <div class="ac-generic">${highlightMatch(m.generic_name, medsState.searchQuery)}</div>
                </div>`;
            }).join('');
        }

        function highlightMatch(text, query) {
            if (!query || query.length < 2) return escMedHtml(text);
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return escMedHtml(text);
            const before = text.slice(0, idx);
            const match = text.slice(idx, idx + query.length);
            const after = text.slice(idx + query.length);
            return escMedHtml(before) + '<span class="med-ac-match">' + escMedHtml(match) + '</span>' + escMedHtml(after);
        }

        function selectMedFromAutocomplete(medId) {
            const med = MEDS.find(m => m.id === medId);
            if (med) {
                medsState.searchQuery = med.brand_name;
                medAcIndex = -1;
                renderMeds();
            }
        }

        // === Favorites ===

        function toggleMedFavorite(medId) {
            const idx = medsState.favorites.indexOf(medId);
            if (idx >= 0) {
                medsState.favorites.splice(idx, 1);
            } else {
                medsState.favorites.push(medId);
            }
            localStorage.setItem('medFavorites', JSON.stringify(medsState.favorites));
            renderMeds();
        }

        function toggleMedFavoritesOnly() {
            medsState.showFavoritesOnly = !medsState.showFavoritesOnly;
            renderMeds();
        }

        // === Copy Rx ===

        function copyMedRx(medId) {
            const med = MEDS.find(m => m.id === medId);
            if (!med) return;
            let text = med.brand_name;
            text += '\n' + med.generic_name;
            text += '\nDosing: ' + med.typical_dosing;
            text += '\nSize: ' + med.bottle_size;
            if (med.notes) text += '\nNotes: ' + med.notes;

            const btn = document.getElementById('copyBtn_' + medId);
            const onSuccess = () => {
                if (btn) {
                    btn.classList.add('copied');
                    btn.innerHTML = '\u2713 Copied';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = '\uD83D\uDCCB Copy Rx';
                    }, 2000);
                }
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopyMed(text);
                    onSuccess();
                });
            } else {
                fallbackCopyMed(text);
                onSuccess();
            }
        }

        function fallbackCopyMed(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        // INIT
        render();
    </script>
</body>
</html>
