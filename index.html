            {id:"med_062",brand_name:"Pataday Extra Strength (OTC)",generic_name:"Olopatadine 0.7%",generic_available:false,drug_class:"Antihistamine / Mast cell stabilizer",condition:"allergy",typical_dosing:"1 drop in affected eye(s) once daily",bottle_size:"2.5 mL / 5 mL",preservative_free:false,avg_brand_price:25,avg_generic_price:null,notes:"OTC. Formerly Pazeo. Highest concentration olopatadine. Once daily, strongest OTC allergy drop available.",price_size:"2.5 mL",route:"topical"},
            {id:"med_063",brand_name:"Opcon-A / Naphcon-A (OTC)",generic_name:"Naphazoline 0.025% / Pheniramine 0.3%",generic_available:true,drug_class:"Antihistamine / Decongestant",condition:"allergy",typical_dosing:"1-2 drops in affected eye(s) up to four times daily",bottle_size:"15 mL",preservative_free:false,avg_brand_price:12,avg_generic_price:8,notes:"OTC. Contains a decongestant (vasoconstrictor) + antihistamine. Short-term use only \u2014 risk of rebound redness with chronic use. Not preferred long-term.",price_size:"15 mL",route:"topical"},
            {id:"med_064",brand_name:"Alocril",generic_name:"Nedocromil sodium 2%",generic_available:true,drug_class:"Mast cell stabilizer",condition:"allergy",typical_dosing:"1-2 drops in affected eye(s) twice daily",bottle_size:"5 mL",preservative_free:false,avg_brand_price:200,avg_generic_price:30,notes:"Pure mast cell stabilizer. Requires consistent use for full prophylactic effect (1-2 weeks). Best for seasonal allergy prevention.",price_size:"5 mL",route:"topical"},
            {id:"med_065",brand_name:"Alomide",generic_name:"Lodoxamide tromethamine 0.1%",generic_available:true,drug_class:"Mast cell stabilizer",condition:"allergy",typical_dosing:"1-2 drops in affected eye(s) four times daily",bottle_size:"10 mL",preservative_free:false,avg_brand_price:200,avg_generic_price:25,notes:"Mast cell stabilizer. May be especially useful for vernal keratoconjunctivitis. Requires consistent dosing for prophylactic benefit.",price_size:"10 mL",route:"topical"},
            {id:"med_066",brand_name:"Crolom",generic_name:"Cromolyn sodium 4%",generic_available:true,drug_class:"Mast cell stabilizer",condition:"allergy",typical_dosing:"1-2 drops in affected eye(s) four to six times daily",bottle_size:"10 mL",preservative_free:false,avg_brand_price:150,avg_generic_price:20,notes:"First-generation mast cell stabilizer. Requires frequent dosing (4-6x daily). Largely replaced by newer dual-action agents but still available.",price_size:"10 mL",route:"topical"},
            {id:"med_067",brand_name:"Elestat",generic_name:"Epinastine HCl 0.05%",generic_available:true,drug_class:"Antihistamine / Mast cell stabilizer",condition:"allergy",typical_dosing:"1 drop in affected eye(s) twice daily",bottle_size:"5 mL",preservative_free:false,avg_brand_price:250,avg_generic_price:30,notes:"Dual-action H1 antihistamine + mast cell stabilizer. Also has anti-leukotriene and anti-PAF activity. Generic available.",price_size:"5 mL",route:"topical"},
            {id:"med_068",brand_name:"Optivar",generic_name:"Azelastine HCl 0.05%",generic_available:true,drug_class:"Antihistamine / Mast cell stabilizer",condition:"allergy",typical_dosing:"1 drop in affected eye(s) twice daily",bottle_size:"6 mL",preservative_free:false,avg_brand_price:200,avg_generic_price:20,notes:"Dual-action antihistamine + mast cell stabilizer. Also available as nasal spray (Astelin). Generic available.",price_size:"6 mL",route:"topical"},

            // === Additional Bacterial Infection Medications ===
            {id:"med_069",brand_name:"Tobrex",generic_name:"Tobramycin 0.3%",generic_available:true,drug_class:"Aminoglycoside antibiotic",condition:"bacterial_infection",typical_dosing:"1-2 drops every 4 hours; ointment 2-3 times daily",bottle_size:"5 mL / 10 mL (drops) / 3.5 g (ointment)",preservative_free:false,avg_brand_price:120,avg_generic_price:15,notes:"Aminoglycoside with good gram-negative coverage. Available as drops and ointment. Ointment useful at bedtime or for kids.",price_size:"5 mL",route:"topical"},
            {id:"med_070",brand_name:"Ocuflox",generic_name:"Ofloxacin 0.3%",generic_available:true,drug_class:"Fluoroquinolone (2nd generation)",condition:"bacterial_infection",typical_dosing:"1-2 drops every 2-4 hours for 2 days, then four times daily for 5 days",bottle_size:"5 mL / 10 mL",preservative_free:false,avg_brand_price:100,avg_generic_price:10,notes:"Older fluoroquinolone. Approved for corneal ulcers. Very affordable generic. Increasing resistance limits utility for empiric therapy.",price_size:"5 mL",route:"topical"},
            {id:"med_071",brand_name:"Zymaxid",generic_name:"Gatifloxacin 0.5%",generic_available:true,drug_class:"Fluoroquinolone (4th generation)",condition:"bacterial_infection",typical_dosing:"1 drop every 2 hours while awake for 1 day, then 2-4 times daily for 5-6 days",bottle_size:"2.5 mL / 5 mL",preservative_free:false,avg_brand_price:250,avg_generic_price:25,notes:"4th-generation fluoroquinolone. Good broad-spectrum coverage. Loading dose then taper regimen. Generic available.",price_size:"2.5 mL",route:"topical"},
            {id:"med_072",brand_name:"Garamycin / Gentamicin",generic_name:"Gentamicin sulfate 0.3%",generic_available:true,drug_class:"Aminoglycoside antibiotic",condition:"bacterial_infection",typical_dosing:"1-2 drops every 4 hours; for severe infections every hour",bottle_size:"5 mL / 15 mL",preservative_free:false,avg_brand_price:50,avg_generic_price:8,notes:"Aminoglycoside antibiotic. Excellent gram-negative coverage. Also used in fortified preparations for severe corneal ulcers.",price_size:"5 mL",route:"topical"},
            {id:"med_073",brand_name:"Bacitracin Ophthalmic Ointment",generic_name:"Bacitracin 500 units/g ointment",generic_available:true,drug_class:"Polypeptide antibiotic",condition:"bacterial_infection",typical_dosing:"Apply 1 cm ribbon in affected eye(s) every 3-4 hours or at bedtime",bottle_size:"3.5 g tube",preservative_free:true,avg_brand_price:30,avg_generic_price:10,notes:"Ointment only. Good gram-positive coverage. Useful at bedtime or as adjunct to daytime drops. Good for stye/chalazion.",price_size:"3.5 g tube",route:"topical"},
            {id:"med_074",brand_name:"Polysporin Ophthalmic Ointment",generic_name:"Bacitracin zinc / Polymyxin B ointment",generic_available:true,drug_class:"Combination antibiotic (ointment)",condition:"bacterial_infection",typical_dosing:"Apply 1 cm ribbon every 3-4 hours or at bedtime",bottle_size:"3.5 g tube",preservative_free:true,avg_brand_price:40,avg_generic_price:12,notes:"Double antibiotic ointment. Gram-positive (bacitracin) + gram-negative (polymyxin B). No neomycin \u2014 avoids allergy risk. Good bedtime adjunct.",price_size:"3.5 g tube",route:"topical"},
            {id:"med_075",brand_name:"Neosporin Ophthalmic",generic_name:"Neomycin / Polymyxin B / Gramicidin",generic_available:true,drug_class:"Triple antibiotic combination",condition:"bacterial_infection",typical_dosing:"1-2 drops every 4 hours for 7-10 days",bottle_size:"10 mL",preservative_free:false,avg_brand_price:40,avg_generic_price:12,notes:"Triple antibiotic solution. Broad spectrum. Watch for neomycin contact allergy (up to 10% of patients). Affordable generic.",price_size:"10 mL",route:"topical"},
            {id:"med_076",brand_name:"Quixin",generic_name:"Levofloxacin 0.5%",generic_available:true,drug_class:"Fluoroquinolone (3rd generation)",condition:"bacterial_infection",typical_dosing:"1-2 drops every 2 hours while awake for 2 days, then every 4 hours for 5 days",bottle_size:"5 mL / 10 mL",preservative_free:false,avg_brand_price:150,avg_generic_price:15,notes:"3rd-generation fluoroquinolone. Good broad-spectrum coverage. Largely replaced by 4th-gen FQs but still effective and affordable as generic.",price_size:"5 mL",route:"topical"},

            // === Oral Antibiotics ===
            {id:"med_077",brand_name:"Augmentin (oral)",generic_name:"Amoxicillin / Clavulanate 875 mg tablet",generic_available:true,drug_class:"Penicillin / Beta-lactamase inhibitor (oral)",condition:"bacterial_infection",typical_dosing:"875 mg PO twice daily for 10 days",bottle_size:"20 tablets",preservative_free:false,avg_brand_price:80,avg_generic_price:15,notes:"First-line oral antibiotic for preseptal cellulitis, dacryocystitis, and infected lacrimal system. Ask about penicillin allergy.",price_size:"20 tablets",route:"oral"},
            {id:"med_078",brand_name:"Keflex (oral)",generic_name:"Cephalexin 500 mg capsule",generic_available:true,drug_class:"Cephalosporin (1st generation, oral)",condition:"bacterial_infection",typical_dosing:"500 mg PO every 12 hours for 5-7 days",bottle_size:"20 capsules",preservative_free:false,avg_brand_price:60,avg_generic_price:10,notes:"Alternative oral antibiotic for preseptal cellulitis if penicillin-intolerant (caution with severe penicillin allergy \u2014 cross-reactivity). Very affordable.",price_size:"20 capsules",route:"oral"},
            {id:"med_079",brand_name:"Z-Pak (oral)",generic_name:"Azithromycin 250 mg tablet (6-pack)",generic_available:true,drug_class:"Macrolide antibiotic (oral)",condition:"bacterial_infection",typical_dosing:"500 mg PO day 1, then 250 mg PO daily for 4 days",bottle_size:"6 tablets (Z-Pak)",preservative_free:false,avg_brand_price:60,avg_generic_price:10,notes:"Convenient 5-day course. Used for preseptal cellulitis (if penicillin-allergic), chlamydial conjunctivitis (1g single dose). Also used off-label for blepharitis.",price_size:"6 tablets",route:"oral"},
            {id:"med_080",brand_name:"Doxycycline (oral)",generic_name:"Doxycycline 50-100 mg capsule",generic_available:true,drug_class:"Tetracycline antibiotic (oral)",condition:"bacterial_infection",typical_dosing:"100 mg PO twice daily; 50 mg daily for maintenance (MGD)",bottle_size:"30-60 capsules",preservative_free:false,avg_brand_price:50,avg_generic_price:10,notes:"Widely used for posterior blepharitis, MGD, and rosacea-related eye disease. Anti-inflammatory at sub-antimicrobial doses (20-50 mg). Photosensitivity and GI upset are common.",price_size:"30 capsules",route:"oral"},
            {id:"med_081",brand_name:"Bactrim DS (oral)",generic_name:"Sulfamethoxazole 800 mg / Trimethoprim 160 mg tablet",generic_available:true,drug_class:"Sulfonamide combination (oral)",condition:"bacterial_infection",typical_dosing:"1 tablet PO every 12 hours for 10 days",bottle_size:"20 tablets",preservative_free:false,avg_brand_price:40,avg_generic_price:8,notes:"Alternative oral antibiotic for preseptal cellulitis with MRSA concerns. Ask about sulfa allergy. Very affordable generic.",price_size:"20 tablets",route:"oral"},

            // === Additional Viral Infection Medications ===
            {id:"med_082",brand_name:"Zovirax (oral)",generic_name:"Acyclovir 400-800 mg tablet",generic_available:true,drug_class:"Antiviral (oral nucleoside analog)",condition:"viral_infection",typical_dosing:"800 mg PO five times daily for 7 days (HZO); 400 mg PO five times daily for 7 days (HSV)",bottle_size:"30-60 tablets",preservative_free:false,avg_brand_price:150,avg_generic_price:10,notes:"Oral antiviral for HSV keratitis and herpes zoster ophthalmicus. Most affordable oral antiviral. Requires more frequent dosing than valacyclovir. Adjust for renal impairment.",price_size:"30 tablets",route:"oral"},

            // === Additional Combination Antibiotic/Steroid ===
            {id:"med_084",brand_name:"Blephamide",generic_name:"Sulfacetamide 10% / Prednisolone acetate 0.2%",generic_available:true,drug_class:"Sulfonamide antibiotic / Corticosteroid combination",condition:"combination",typical_dosing:"1-2 drops every 4 hours",bottle_size:"5 mL / 10 mL",preservative_free:false,avg_brand_price:200,avg_generic_price:25,notes:"Low-potency steroid combo. Good for blepharitis and mild anterior segment inflammation with infection risk. Ask about sulfa allergy.",price_size:"5 mL",route:"topical"},

            // === Additional Mydriatics & Cycloplegics ===
            {id:"med_087",brand_name:"Paremyd",generic_name:"Hydroxyamphetamine 1% / Tropicamide 0.25%",generic_available:false,drug_class:"Sympathomimetic / Parasympatholytic combination",condition:"mydriatic_cycloplegic",typical_dosing:"1-2 drops, onset 15-20 minutes",bottle_size:"15 mL",preservative_free:false,avg_brand_price:40,avg_generic_price:null,notes:"Combination mydriatic. Provides dilation without significant cycloplegia. Useful for fundus examination. Can also be used to test for Horner syndrome.",price_size:"15 mL",route:"topical"},

            {id:"med_090",brand_name:"Xdemvy",generic_name:"Lotilaner 0.25%",generic_available:false,drug_class:"Parasiticide (isoxazoline)",condition:"demodex",typical_dosing:"1 drop in each eye twice daily for 6 weeks",bottle_size:"10 mL",preservative_free:false,avg_brand_price:600,avg_generic_price:null,notes:"First FDA-approved treatment for Demodex blepharitis. 6-week course. Targets mites directly. Instillation site stinging is common.",price_size:"10 mL",route:"topical"},
            {id:"med_091",brand_name:"Lacrisert",generic_name:"Hydroxypropyl cellulose 5 mg insert",generic_available:false,drug_class:"Tear film stabilizer (ophthalmic insert)",condition:"dry_eye",typical_dosing:"1 insert in each inferior cul-de-sac once daily",bottle_size:"60 inserts per box",preservative_free:true,avg_brand_price:400,avg_generic_price:null,notes:"Preservative-free slow-release insert for moderate-to-severe dry eye. Placed in lower fornix. Dissolves over the day. Good for patients who cannot use drops frequently.",price_size:"60-count box",route:"insert"},
            {id:"med_092",brand_name:"Verkazia",generic_name:"Cyclosporine 0.1% cationic emulsion",generic_available:false,drug_class:"Calcineurin inhibitor / Immunomodulator",condition:"dry_eye",typical_dosing:"1 drop in affected eye(s) four times daily",bottle_size:"0.3 mL single-use vials (120 count)",preservative_free:true,avg_brand_price:800,avg_generic_price:null,notes:"Cationic emulsion formulation of cyclosporine. FDA-approved for vernal keratoconjunctivitis (VKC) in children and adults. Enhanced ocular surface retention.",price_size:"120-count box",route:"topical"},

            // === Additional Glaucoma Medications ===
            {id:"med_094",brand_name:"Betoptic-S",generic_name:"Betaxolol 0.25% suspension",generic_available:true,drug_class:"Beta-1 selective blocker",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) twice daily",bottle_size:"5 mL / 10 mL / 15 mL",preservative_free:false,avg_brand_price:180,avg_generic_price:25,notes:"Cardioselective beta-blocker \u2014 safer option for patients with mild asthma or COPD compared to non-selective beta-blockers. Less IOP lowering than timolol.",price_size:"5 mL",route:"topical"},
            {id:"med_095",brand_name:"Betagan",generic_name:"Levobunolol 0.25-0.5%",generic_available:true,drug_class:"Non-selective beta-blocker",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) once to twice daily",bottle_size:"5 mL / 10 mL / 15 mL",preservative_free:false,avg_brand_price:150,avg_generic_price:20,notes:"Non-selective beta-blocker similar to timolol. Available in 0.25% and 0.5%. Same contraindications as timolol (asthma, COPD, bradycardia).",price_size:"5 mL",route:"topical"},
            {id:"med_096",brand_name:"Simbrinza",generic_name:"Brinzolamide 1% / Brimonidine 0.2%",generic_available:false,drug_class:"CAI / Alpha-2 agonist combination",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) three times daily",bottle_size:"8 mL / 10 mL",preservative_free:false,avg_brand_price:280,avg_generic_price:null,notes:"Fixed combination without a beta-blocker. Good for patients who cannot tolerate beta-blockers. Shake well (suspension). Three-times-daily dosing.",price_size:"8 mL",route:"topical"},
            {id:"med_097",brand_name:"Iopidine",generic_name:"Apraclonidine 0.5%",generic_available:true,drug_class:"Alpha-2 adrenergic agonist",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) three times daily; or 1 drop pre/post laser",bottle_size:"5 mL / 10 mL",preservative_free:false,avg_brand_price:150,avg_generic_price:30,notes:"Primarily used to prevent IOP spikes after laser procedures (SLT, YAG). High rate of tachyphylaxis and allergic reaction with chronic use. Not for long-term therapy.",price_size:"5 mL",route:"topical"},
            {id:"med_098",brand_name:"Iyuzeh",generic_name:"Latanoprost 0.005% (preservative-free)",generic_available:false,drug_class:"Prostaglandin analog (preservative-free)",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) once daily in the evening",bottle_size:"0.2 mL single-use vials (30 count)",preservative_free:true,avg_brand_price:250,avg_generic_price:null,notes:"Preservative-free latanoprost in unit-dose vials. Good for patients with ocular surface disease or BAK sensitivity who need a PGA.",price_size:"30-count box",route:"topical"},
            {id:"med_099",brand_name:"Zioptan",generic_name:"Tafluprost 0.0015%",generic_available:false,drug_class:"Prostaglandin analog (preservative-free)",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) once daily in the evening",bottle_size:"0.3 mL single-use vials (30 count)",preservative_free:true,avg_brand_price:250,avg_generic_price:null,notes:"First preservative-free prostaglandin analog. Unit-dose vials. Same class side effects as other PGAs (iris darkening, lash growth).",price_size:"30-count box",route:"topical"},
            {id:"med_100",brand_name:"Xelpros",generic_name:"Latanoprost 0.005% (BAK-free)",generic_available:false,drug_class:"Prostaglandin analog (BAK-free)",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) once daily in the evening",bottle_size:"2.5 mL / 5 mL",preservative_free:false,avg_brand_price:250,avg_generic_price:null,notes:"BAK-free latanoprost in multi-dose bottle. Uses potassium sorbate instead of BAK. Not technically preservative-free but avoids BAK toxicity.",price_size:"2.5 mL",route:"topical"},
            {id:"med_101",brand_name:"Pilocarpine (glaucoma)",generic_name:"Pilocarpine HCl 1-4%",generic_available:true,drug_class:"Cholinergic agonist / Miotic",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) four times daily",bottle_size:"5 mL / 15 mL",preservative_free:false,avg_brand_price:40,avg_generic_price:10,notes:"Oldest glaucoma medication. Causes miosis and ciliary muscle contraction. Side effects include brow ache, dim vision, and induced myopia. Rarely used as primary therapy today.",price_size:"15 mL",route:"topical"},
            {id:"med_102",brand_name:"Diamox (oral)",generic_name:"Acetazolamide 250-500 mg tablet",generic_available:true,drug_class:"Carbonic anhydrase inhibitor (oral)",condition:"glaucoma",typical_dosing:"250-500 mg PO every 6-12 hours; or 500 mg ER twice daily",bottle_size:"100 tablets",preservative_free:false,avg_brand_price:100,avg_generic_price:15,notes:"Oral CAI for acute IOP spikes and as adjunct to topical therapy. Side effects: tingling, taste alteration, fatigue, metabolic acidosis, kidney stones. Check sulfa allergy.",price_size:"100 tablets",route:"oral"},
            {id:"med_103",brand_name:"Neptazane (oral)",generic_name:"Methazolamide 25-50 mg tablet",generic_available:true,drug_class:"Carbonic anhydrase inhibitor (oral)",condition:"glaucoma",typical_dosing:"25-50 mg PO two to three times daily",bottle_size:"100 tablets",preservative_free:false,avg_brand_price:80,avg_generic_price:20,notes:"Oral CAI alternative to acetazolamide. Better tolerated by some patients. Lower incidence of kidney stones than acetazolamide. Sulfonamide derivative.",price_size:"100 tablets",route:"oral"},
            {id:"med_104",brand_name:"Timoptic XE",generic_name:"Timolol maleate 0.25-0.5% gel-forming solution",generic_available:true,drug_class:"Non-selective beta-blocker (gel-forming)",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) once daily",bottle_size:"2.5 mL / 5 mL",preservative_free:false,avg_brand_price:120,avg_generic_price:15,notes:"Gel-forming timolol \u2014 longer contact time allows once-daily dosing. Causes transient blurred vision after instillation. Available in preservative-free form.",price_size:"2.5 mL",route:"topical"},
            {id:"med_105",brand_name:"Ocupress",generic_name:"Carteolol HCl 1%",generic_available:true,drug_class:"Non-selective beta-blocker (with ISA)",condition:"glaucoma",typical_dosing:"1 drop in affected eye(s) twice daily",bottle_size:"5 mL / 10 mL / 15 mL",preservative_free:false,avg_brand_price:100,avg_generic_price:20,notes:"Non-selective beta-blocker with intrinsic sympathomimetic activity (ISA). May cause less bradycardia than timolol. Rarely used first-line today.",price_size:"5 mL",route:"topical"},

            // === Additional Steroid Medications ===
            {id:"med_106",brand_name:"Maxidex",generic_name:"Dexamethasone 0.1% suspension",generic_available:true,drug_class:"Corticosteroid (high potency)",condition:"inflammation_steroid",typical_dosing:"1-2 drops four to six times daily; taper based on response",bottle_size:"5 mL / 15 mL",preservative_free:false,avg_brand_price:200,avg_generic_price:20,notes:"Potent dexamethasone suspension. Good penetration for anterior uveitis. Shake well. High IOP risk \u2014 monitor closely. Very affordable generic.",price_size:"5 mL",route:"topical"},

        function newEye() {
            return { sphSign:"\u2212", sphAbs:"", cylSign:"\u2212", cylAbs:"", axis:"", addAbs:"", sphere:"0", cylinder:"0", add:"" };
        }

        let state = {
            step: 0,
            od: newEye(),
            os: newEye(),
            dominantEye: null,
            modality: [],
            brands: [...BRANDS],
            selectedLens: null,
            hasVisitedResults: false,
            troubleshoot: null,
            tsAdjustment: null,
            nonAdaptFrom: null,
            sortBy: "dk",
            sortDir: "desc",
        };

        // HELPERS
        function vertexConvert(sph, vd = 12) {
            if (Math.abs(sph) < 4) return sph;
            const d = vd / 1000;
            return Math.round((sph / (1 - d * sph)) * 4) / 4;
        }

        function calcYearlyCost(lens) {
            // Parse price: handles "$75", "$52–70", "$90 (90pk)"
            const rangeMatch = lens.price.match(/\$(\d+)[\u2013\-](\d+)/);
            const singleMatch = lens.price.match(/\$(\d+)(?!\d*[\u2013\-]\d)/);
            let price;
            if (rangeMatch) {
                price = Math.round((parseInt(rangeMatch[1]) + parseInt(rangeMatch[2])) / 2);
            } else if (singleMatch) {
                price = parseInt(singleMatch[1]);
            } else {
                return null;
            }

            // Parse pack size: check for "(Xpk)" first, else use first qty value
            const pkMatch = lens.price.match(/\((\d+)pk\)/);
            const packSize = pkMatch ? parseInt(pkMatch[1]) : parseInt(lens.qty.split(",")[0].trim());

            // Lenses needed per eye per year
            const perEye = { daily:365, weekly:52, biweekly:26, monthly:12 }[lens.modality];
            if (!perEye || !packSize) return null;

            const packsPerEye = Math.ceil(perEye / packSize);
            const packsTotal = packsPerEye * 2;
            return packsTotal * price;
        }

        function formatYearlyCost(lens) {
            const cost = calcYearlyCost(lens);
            if (!cost) return "";
            return `~$${cost}/yr`;
        }

        function brandClass(brand) {
            if (brand === "Alcon") return "alcon";
            if (brand === "Bausch + Lomb") return "bl";
            if (brand === "CooperVision") return "cv";
            return "jj";
        }

        function getNeededTypeForEye(eye) {
            const cyl = parseFloat(eye.cylinder) || 0;
            const hasCyl = cyl !== 0 && Math.abs(cyl) > 0.50;
            const hasAdd = eye.add && parseFloat(eye.add) > 0;
            if (hasCyl && hasAdd) return "multifocal-toric";
            if (hasAdd) return "multifocal";
            if (hasCyl) return "toric";
            return "sphere";
        }

        function isLensCompatibleWithEye(lens, eye) {
            const sph = parseFloat(eye.sphere) || 0;
            const cyl = parseFloat(eye.cylinder) || 0;
            let clSph = vertexConvert(sph);
            const needed = getNeededTypeForEye(eye);
            const hasCyl = cyl !== 0 && Math.abs(cyl) > 0.50;

            // SE adjustment: fold -0.50 cyl into sphere
            if (Math.abs(cyl) === 0.50) {
                clSph = snapTo025(clSph + cyl / 2);
            }

            if (needed === "sphere" && lens.type !== "sphere") return false;
            if (needed === "toric" && lens.type !== "toric") return false;
            if (needed === "multifocal" && lens.type !== "multifocal") return false;
            if (needed === "multifocal-toric") {
                const absCyl = Math.abs(cyl);
                // Low cyl (≤ 0.75): also recommend non-toric multifocal lenses
                if (absCyl <= 0.75 && lens.type === "multifocal") { /* allow */ }
                else if (lens.type !== "multifocal-toric") return false;
            }

            if (clSph < lens.sphMin || clSph > lens.sphMax) return false;

            if (hasCyl && (lens.type === "toric" || lens.type === "multifocal-toric")) {
                const absCyl = Math.abs(cyl);
                const absMin = Math.abs(lens.cylMin);
                const absMax = Math.abs(lens.cylMax);
                if (absCyl < absMin || absCyl > absMax) return false;
            }

            return true;
        }

        function getCompatibleLenses() {
            const results = [];
            const seen = new Set();

            LENSES.forEach(lens => {
                if (state.modality.length > 0 && !state.modality.includes(lens.modality)) return;
                if (!state.brands.includes(lens.brand)) return;

                const odOk = isLensCompatibleWithEye(lens, state.od);
                const osOk = isLensCompatibleWithEye(lens, state.os);

                if (odOk || osOk) {
                    results.push({ ...lens, forOD: odOk, forOS: osOk });
                }
            });

            const dir = state.sortDir === "asc" ? 1 : -1;
            return results.sort((a, b) => {
                if (state.sortBy === "dk") return (a.dk - b.dk) * dir;
                if (state.sortBy === "brand") return a.brand.localeCompare(b.brand) * dir;
                if (state.sortBy === "name") return a.name.localeCompare(b.name) * dir;
                if (state.sortBy === "price") {
                    const ca = calcYearlyCost(a);
                    const cb = calcYearlyCost(b);
                    const va = ca || 99999;
                    const vb = cb || 99999;
                    return (va - vb) * dir;
                }
                return 0;
            });
        }

        function getBrandsWithResults() {
            return BRANDS.filter(brand => {
                return LENSES.some(lens => {
                    if (state.modality.length > 0 && !state.modality.includes(lens.modality)) return false;
                    if (lens.brand !== brand) return false;
                    return isLensCompatibleWithEye(lens, state.od) || isLensCompatibleWithEye(lens, state.os);
                });
            });
        }

        function countByModality(mod) {
            return LENSES.filter(l => {
                if (l.modality !== mod) return false;
                const odOk = isLensCompatibleWithEye(l, state.od);
                const osOk = isLensCompatibleWithEye(l, state.os);
                return odOk || osOk;
            }).length;
        }

        // RENDERING
        function render() {
            renderSteps();
            renderContent();
            renderNav();
            if (state.step === 0) bindRxInputs();
        }

        function renderSteps() {
            const bar = document.getElementById("stepsBar");
            let html = "";

            STEP_LABELS.forEach((label, i) => {
                const cls = i === state.step ? "active" : i < state.step ? "done" : "disabled";
                html += `<div class="step-item ${cls}" onclick="${i <= state.step ? `goToStep(${i})` : ''}">
                    <div class="step-num"></div>
                    <span class="step-label">${label}</span>
                </div>`;

                if (i < STEP_LABELS.length - 1) {
                    html += `<div class="step-line ${i < state.step ? 'done' : ''}"></div>`;
                }
            });

            bar.innerHTML = html;
        }

        function renderContent() {
            const el = document.getElementById("stepContent");

            switch (state.step) {
                case 0:
                    el.innerHTML = renderRxStep();
                    break;
                case 1:
                    el.innerHTML = renderModalityStep();
                    break;
                case 2:
                    el.innerHTML = renderBrandsStep();
                    break;
                case 3:
                    el.innerHTML = state.troubleshoot !== null ? renderTroubleshootStep() : state.selectedLens ? renderOrderDetail() : renderResultsStep();
                    break;
            }
        }

        function renderNav() {
            const back = document.getElementById("btnBack");
            const next = document.getElementById("btnNext");
            const navRow = back.parentElement;

            if (state.step === 3 && (state.selectedLens || state.troubleshoot !== null)) {
                navRow.style.display = "none";
                return;
            }

            navRow.style.display = "flex";
            back.disabled = state.step === 0;
            back.style.visibility = state.step === 0 ? "hidden" : "visible";

            if (state.step === 3) {
                next.textContent = "\u27F3 New Search";
                next.disabled = false;
            } else if (state.step === 2) {
                const count = getCompatibleLenses().length;
                next.textContent = `Show Results (${count}) \u2192`;
                next.disabled = false;
            } else {
                next.textContent = "Next \u2192";
                next.disabled = false;
            }
        }

        // SELECT OPTION GENERATORS (0.00 at top, ascending)
        function buildPowerOptions(max, currentVal) {
            const opts = [];
            for (let v = 0; v <= max; v = Math.round((v + 0.25) * 100) / 100) {
                const label = v.toFixed(2);
                const sel = currentVal === label ? "selected" : "";
                opts.push(`<option value="${label}" ${sel}>${label}</option>`);
            }
            return opts.join("");
        }

        // Compute signed values for one eye (transpose plus cyl to minus cyl)
        function computeEye(eye) {
            const sphVal = parseFloat(eye.sphAbs);
            let sph = (!isNaN(sphVal) && eye.sphAbs !== "") ? (eye.sphSign === '+' ? sphVal : -sphVal) : 0;

            const cylVal = parseFloat(eye.cylAbs);
            let cyl = (!isNaN(cylVal) && eye.cylAbs !== "") ? (eye.cylSign === '+' ? cylVal : -cylVal) : 0;

            let axis = eye.axis ? Math.min(180, Math.max(1, parseInt(eye.axis))) : 0;

            // Transpose plus cylinder to minus cylinder
            if (cyl > 0) {
                sph = sph + cyl;
                cyl = -cyl;
                axis = ((axis + 90) % 180) || 180;
            }

            eye.sphere = String(sph);
            eye.cylinder = String(cyl);
            eye.transposedAxis = String(axis);

            const addVal = parseFloat(eye.addAbs);
            eye.add = (!isNaN(addVal) && eye.addAbs !== "") ? String(addVal) : "";
        }

        function computeSigned() {
            computeEye(state.od);
            computeEye(state.os);
        }

        // Build form HTML for one eye
        function buildEyeForm(prefix, eye, label) {
            const cyl = parseFloat(eye.cylinder) || 0;
            const hasCyl = eye.cylinder && cyl !== 0;

            return `<div class="eye-section">
                <div class="eye-header">${label}</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Sphere (SPH)</label>
                        <div class="input-row">
                            <div class="sign-toggle">
                                <button type="button" id="${prefix}_sphNeg" class="${eye.sphSign === '+' ? '' : 'active-neg'}">\u2212</button>
                                <button type="button" id="${prefix}_sphPos" class="${eye.sphSign === '+' ? 'active-pos' : ''}">+</button>
                            </div>
                            <select id="${prefix}_inSph">${buildPowerOptions(20, eye.sphAbs || "0.00")}</select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Cylinder (CYL)</label>
                        <div class="input-row">
                            <div class="sign-toggle">
                                <button type="button" id="${prefix}_cylNeg" class="${eye.cylSign === '+' ? '' : 'active-neg'}">\u2212</button>
                                <button type="button" id="${prefix}_cylPos" class="${eye.cylSign === '+' ? 'active-pos' : ''}">+</button>
                            </div>
                            <select id="${prefix}_inCyl">${buildPowerOptions(6, eye.cylAbs || "0.00")}</select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Axis</label>
                        <div class="input-row">
                            <div class="sign-toggle">
                                <button type="button" id="${prefix}_axis90" class="${eye.axis === '90' ? 'active-90' : ''}" ${!hasCyl ? "disabled" : ""}>90</button>
                                <button type="button" id="${prefix}_axis180" class="${eye.axis === '180' ? 'active-180' : ''}" ${!hasCyl ? "disabled" : ""}>180</button>
                            </div>
                            <input type="text" inputmode="numeric" id="${prefix}_inAxis" value="${eye.axis}" placeholder="180" ${!hasCyl ? "disabled" : ""}>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Add Power</label>
                        <select id="${prefix}_inAdd">${buildPowerOptions(4, eye.addAbs || "0.00")}</select>
                    </div>
                </div>
            </div>`;
        }

        // Build vertex summary for one eye
        function buildVertexSummary(eye, label) {
            const sph = parseFloat(eye.sphere) || 0;
            const cyl = parseFloat(eye.cylinder) || 0;
            const addP = parseFloat(eye.add) || 0;
            const hasCyl = cyl !== 0 && Math.abs(cyl) > 0.50;
            const foldCyl = cyl !== 0 && Math.abs(cyl) === 0.50;
            const hasAdd = eye.add && addP > 0;
            if (sph === 0 && !hasCyl && !foldCyl && !hasAdd) return "";
            let clSph = vertexConvert(sph);
            if (foldCyl) clSph = snapTo025(clSph + cyl / 2);
            const needed = getNeededTypeForEye(eye);
            const typeLabel = { sphere:"Spherical", toric:"Toric", multifocal:"Multifocal", "multifocal-toric":"MF Toric" }[needed];

            const sphStr = `${clSph > 0 ? "+" : ""}${clSph.toFixed(2)}`;
            const parts = [sphStr];
            if (hasCyl) parts.push(`${cyl.toFixed(2)}`);
            const displayAxis = eye.cylSign === '+' ? eye.transposedAxis : eye.axis;
            if (hasCyl && displayAxis) parts.push(`x ${displayAxis}\u00B0`);
            const rxStr = parts.join(" ");
            const addStr = hasAdd ? ` Add +${addP.toFixed(2)}` : "";
            const seNote = foldCyl ? ` <span class="from">(SE: ${cyl.toFixed(2)} cyl folded in)</span>` : "";
            const vertexNote = "";

            return `<div style="flex:1;min-width:200px">
                <strong>${label}:</strong> ${rxStr}${addStr}${seNote}${vertexNote}
                <div style="margin-top:2px;font-size:11px;color:var(--ink-muted)">${typeLabel}</div>
            </div>`;
        }

        // STEP 1: Rx
        function renderRxStep() {
            const odSummary = buildVertexSummary(state.od, "OD");
            const osSummary = buildVertexSummary(state.os, "OS");
            const hasData = odSummary || osSummary;

            let vertexHtml = "";
            if (hasData) {
                const transposed = state.od.cylSign === '+' || state.os.cylSign === '+';
                const vertexLabel = transposed ? "Contact Lens Rx (Vertexed & Transposed)" : "Contact Lens Rx (Vertexed)";
                vertexHtml = `<div class="vertex-box fade-in">
                    <div class="vertex-label">${vertexLabel}</div>
                    <div class="vertex-values" style="flex-direction:column;gap:8px">
                        ${odSummary}${osSummary}
                    </div>
                </div>`;
            }

            return `<div class="fade-in">
                <h2 class="card-title">Enter Prescription</h2>
                <p class="card-desc">Enter the spectacle Rx \u2014 vertex conversion is automatic for powers over \u00B14.00D</p>

                ${buildEyeForm("od", state.od, "OD — Right Eye")}
                <button type="button" class="copy-od-btn" id="copyOdToOs">&#x2193; Copy OD to OS</button>
                ${buildEyeForm("os", state.os, "OS — Left Eye")}

                <div class="form-grid" style="margin-top:14px">
                    <div class="form-group" style="grid-column: 1 / -1">
                        <label>Dominant Eye (optional)</label>
                        <div class="input-row" style="gap:8px">
                            <button type="button" id="domLeft" class="dom-toggle ${state.dominantEye === 'left' ? 'active-left' : ''}" style="flex:1">Left</button>
                            <button type="button" id="domRight" class="dom-toggle ${state.dominantEye === 'right' ? 'active-right' : ''}" style="flex:1">Right</button>
                        </div>
                    </div>
                </div>

                ${vertexHtml}

                <button type="button" class="clear-rx-btn" id="clearRx">Clear All</button>
            </div>`;
        }

        function rerender(focusId) {
            computeSigned();
            renderContent();
            renderNav();
            bindRxInputs();
            if (focusId) document.getElementById(focusId)?.focus();
        }

        function bindEyeInputs(prefix, eye, onAddChange) {
            const sphNeg = document.getElementById(`${prefix}_sphNeg`);
            const sphPos = document.getElementById(`${prefix}_sphPos`);
            if (sphNeg) sphNeg.addEventListener("click", () => { eye.sphSign = '\u2212'; rerender(); });
            if (sphPos) sphPos.addEventListener("click", () => { eye.sphSign = '+'; rerender(); });

            const cylNeg = document.getElementById(`${prefix}_cylNeg`);
            const cylPos = document.getElementById(`${prefix}_cylPos`);
            if (cylNeg) cylNeg.addEventListener("click", () => { eye.cylSign = '\u2212'; rerender(); });
            if (cylPos) cylPos.addEventListener("click", () => { eye.cylSign = '+'; rerender(); });

            const sphEl = document.getElementById(`${prefix}_inSph`);
            if (sphEl) sphEl.addEventListener("change", (e) => { eye.sphAbs = e.target.value; rerender(); });

            const cylEl = document.getElementById(`${prefix}_inCyl`);
            if (cylEl) cylEl.addEventListener("change", (e) => { eye.cylAbs = e.target.value; rerender(); });

            const axis90 = document.getElementById(`${prefix}_axis90`);
            const axis180 = document.getElementById(`${prefix}_axis180`);
            if (axis90) axis90.addEventListener("click", () => { eye.axis = "90"; rerender(); });
            if (axis180) axis180.addEventListener("click", () => { eye.axis = "180"; rerender(); });

            const axisEl = document.getElementById(`${prefix}_inAxis`);
            if (axisEl) {
                axisEl.addEventListener("blur", (e) => { let v = parseInt(e.target.value.replace(/[^0-9]/g, "")); eye.axis = isNaN(v) || v < 1 ? "" : String(Math.min(180, v)); rerender(); });
                axisEl.addEventListener("keydown", (e) => { if (e.key === "Enter") { let v = parseInt(e.target.value.replace(/[^0-9]/g, "")); eye.axis = isNaN(v) || v < 1 ? "" : String(Math.min(180, v)); rerender(); } });
            }

            const addEl = document.getElementById(`${prefix}_inAdd`);
            if (addEl) addEl.addEventListener("change", (e) => {
                eye.addAbs = e.target.value;
                if (onAddChange) onAddChange(e.target.value);
                rerender();
            });
        }

        function bindRxInputs() {
            bindEyeInputs("od", state.od, (val) => {
                // Auto-populate OS ADD when OD ADD changes
                state.os.addAbs = val;
            });
            bindEyeInputs("os", state.os);

            const copyBtn = document.getElementById("copyOdToOs");
            if (copyBtn) copyBtn.addEventListener("click", () => {
                Object.assign(state.os, JSON.parse(JSON.stringify(state.od)));
                rerender();
            });

            const domLeft = document.getElementById("domLeft");
            const domRight = document.getElementById("domRight");
            if (domLeft) domLeft.addEventListener("click", () => { state.dominantEye = state.dominantEye === 'left' ? null : 'left'; rerender(); });
            if (domRight) domRight.addEventListener("click", () => { state.dominantEye = state.dominantEye === 'right' ? null : 'right'; rerender(); });

            const clearBtn = document.getElementById("clearRx");
            if (clearBtn) clearBtn.addEventListener("click", () => {
                state.od = newEye();
                state.os = newEye();
                state.dominantEye = null;
                state.brands = [...BRANDS];
                rerender();
            });
        }

        // STEP 2: Modality
        function renderModalityStep() {
            const items = MODALITIES.map(m => {
                const count = countByModality(m.id);
                const isActive = state.modality.includes(m.id);
                const isZero = count === 0;

                return `<div class="option-btn ${isActive ? "active" : ""} ${isZero ? "zero" : ""}" onclick="toggleModality('${m.id}')">
                    <div class="icon">${m.icon}</div>
                    <div class="title">${m.label}</div>
                    <div class="desc">${m.desc}</div>
                    <div class="count">${count} lens${count !== 1 ? "es" : ""}</div>
                </div>`;
            }).join("");

            return `<div class="fade-in">
                <h2 class="card-title">Replacement Schedule</h2>
                <p class="card-desc">How often should the lenses be replaced? Select one or show all.</p>
                <div class="option-grid">${items}</div>
                <button class="show-all-btn ${state.modality.length === 0 ? "active" : ""}" onclick="toggleModality(null)">Show all schedules</button>
            </div>`;
        }

        function toggleModality(id) {
            if (id === null) {
                state.modality = [];
            } else if (state.modality.includes(id)) {
                state.modality = state.modality.filter(m => m !== id);
            } else {
                state.modality = [...state.modality, id];
            }
            render();
        }

        // STEP 3: Brands
        function renderBrandsStep() {
            const items = BRANDS.map(brand => {
                const isActive = state.brands.includes(brand);
                const bc = brandClass(brand);

                return `<div class="option-btn brand-btn brand-${bc} ${isActive ? "active" : ""}" onclick="toggleBrand('${brand}')">
                    <div class="check">${isActive ? "\u2713" : ""}</div>
                    <div class="title">${brand}</div>
                    <div class="desc" style="margin-top:4px;font-size:11px;color:var(--ink-muted)">${LENSES.filter(l => l.brand === brand && (state.modality.length === 0 || state.modality.includes(l.modality)) && (isLensCompatibleWithEye(l, state.od) || isLensCompatibleWithEye(l, state.os))).length} compatible</div>
                </div>`;
            }).join("");

            return `<div class="fade-in">
                <h2 class="card-title">Manufacturers</h2>
                <p class="card-desc">Select which brands to include in your results.</p>
                <div class="option-grid">${items}</div>
            </div>`;
        }

        function toggleBrand(brand) {
            if (state.brands.includes(brand)) {
                if (state.brands.length > 1) {
                    state.brands = state.brands.filter(b => b !== brand);
                }
            } else {
                state.brands.push(brand);
            }
            render();
        }

        // STEP 4: Results
        function eyeMetaSummary(eye, label) {
            const sph = parseFloat(eye.sphere) || 0;
            const clSph = vertexConvert(sph);
            const cyl = parseFloat(eye.cylinder) || 0;
            const hasCyl = eye.cylinder && cyl !== 0;
            const needed = getNeededTypeForEye(eye);
            const typeMap = { sphere:"Sph", toric:"Toric", multifocal:"MF", "multifocal-toric":"MF-T" };
            return `${label}: ${typeMap[needed]} ${clSph > 0 ? "+" : ""}${clSph.toFixed(2)}${hasCyl ? ` / ${cyl.toFixed(2)}` : ""}`;
        }

        function renderResultsStep() {
            const lenses = getCompatibleLenses();
            const metaParts = [
                eyeMetaSummary(state.od, "OD"),
                eyeMetaSummary(state.os, "OS"),
                state.modality.length > 0 ? state.modality.join(", ") : "All schedules",
            ].join(" \u00B7 ");

            const sortBtns = ["dk","brand","name","price"].map(s => {
                const labels = { dk:"Dk/t", brand:"Brand", name:"Name", price:"Price" };
                const isActive = state.sortBy === s;
                const arrow = isActive ? (state.sortDir === "asc" ? " \u2191" : " \u2193") : "";
                return `<button class="sort-btn ${isActive ? "active" : ""}" onclick="setSort('${s}')">${labels[s]}${arrow}</button>`;
            }).join("");

            let listHtml;
            if (lenses.length === 0) {
                listHtml = `<div class="empty">
                    <div class="empty-icon"><i class="ph-duotone ph-magnifying-glass"></i></div>
                    <div class="empty-title">No lenses match this prescription</div>
                    <div class="empty-desc">Try expanding your brand selection or modality preference</div>
                </div>`;
            } else {
                listHtml = `<div class="lens-list">${lenses.map(renderLensCard).join("")}</div>`;
            }

            return `<div class="fade-in">
                <div class="results-header">
                    <div>
                        <div class="results-count">${lenses.length} Compatible Lens${lenses.length !== 1 ? "es" : ""}</div>
                        <div class="results-meta">${metaParts}</div>
                    </div>
                    <div class="sort-group">${sortBtns}</div>
                </div>
                ${listHtml}
            </div>`;
        }

        function renderLensCard(lens) {
            const bc = brandClass(lens.brand);
            const brandColor = { alcon:"var(--alcon)", bl:"var(--bl)", cv:"var(--cv)", jj:"var(--jj)" }[bc];
            const hasCyl = lens.cylMin !== 0;

            const specs = [
                { label:"Dk", value:lens.dk },
                { label:"BC", value:lens.bc },
                { label:"Diam", value:lens.diam },
                { label:"Power", value:`${lens.sphMin > 0 ? "+" : ""}${lens.sphMin} to ${lens.sphMax > 0 ? "+" : ""}${lens.sphMax}` },
            ];

            if (hasCyl) specs.push({ label:"Cyl", value:`${lens.cylMin} to ${lens.cylMax} (0.50 steps)` });
            if (lens.axes) specs.push({ label:"Axes", value:lens.axes });
            if (lens.addTypes?.length) specs.push({ label:"Adds", value:lens.addTypes.join(", ") });
            specs.push({ label:"Wear", value:lens.wear });

            const specsHtml = specs.map(s => `<div class="spec-item">
                <div class="spec-label">${s.label}</div>
                <div class="spec-value">${s.value}</div>
            </div>`).join("");

            return `<div class="lens-card">
                <div class="brand-stripe" style="background:${brandColor}"></div>
                <div class="top-row">
                    <div style="flex:1;min-width:180px;padding-left:8px">
                        <div class="badges">
                            <span class="badge badge-eye">${lens.forOD && lens.forOS ? 'OD OS' : lens.forOD ? 'OD' : 'OS'}</span>
                            <span class="badge badge-brand-${bc}">${lens.brand}</span>
                            <span class="badge badge-modality">${lens.modality}</span>
                            <span class="badge badge-dk">Dk ${lens.dk}</span>
                        </div>
                        <div class="lens-name">${lens.name}</div>
                        ${lens.note ? `<div class="lens-note">${lens.note}</div>` : ""}
                    </div>
                    <div>
                        <div class="lens-price">~${lens.price}</div>
                        <div class="lens-qty">Qty: ${lens.qty}</div>
                        <div class="lens-qty" style="color:var(--success);font-weight:600">${formatYearlyCost(lens)}</div>
                    </div>
                </div>
                <div class="lens-specs">${specsHtml}</div>
                <button class="lens-select-btn" onclick="selectLens('${lens.name.replace(/'/g, "\\'")}')" >Select</button>
            </div>`;
        }

        function setSort(s) {
            if (state.sortBy === s) {
                state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
            } else {
                state.sortBy = s;
                // Default: price/name/brand start ascending, dk starts descending (highest first)
                state.sortDir = s === "dk" ? "desc" : "asc";
            }
            render();
        }

        // LENS SELECTION & ORDER PARAMETERS
        function selectLens(name) {
            state.selectedLens = name;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function deselectLens() {
            state.selectedLens = null;
            state.troubleshoot = null;
            state.tsAdjustment = null;
            state.tsRotation = null;
            state.nonAdaptFrom = null;
            render();
        }

        function snapTo025(val) {
            return Math.round(val * 4) / 4;
        }

        function snapCyl(patientCyl, lens) {
            // Always prefer one step LOWER cylinder (less minus) than Rx,
            // then compensate sphere with spherical equivalent.
            const absCyl = Math.abs(patientCyl);
            const absMin = Math.abs(lens.cylMin);
            const absMax = Math.abs(lens.cylMax);

            // Use fixed cylinder steps if lens specifies them
            const steps = [];
            if (lens.cylSteps) {
                lens.cylSteps.forEach(s => steps.push(Math.abs(s)));
            } else {
                for (let s = absMin; s <= absMax + 0.01; s += 0.50) {
                    steps.push(Math.round(s * 100) / 100);
                }
            }

            if (steps.length === 0) return 0;

            // Find the step one lower than patient cyl (less cylinder)
            // Filter to steps <= patient cyl magnitude, then pick the highest one
            const lowerSteps = steps.filter(s => s <= absCyl - 0.01);
            if (lowerSteps.length > 0) {
                return -lowerSteps[lowerSteps.length - 1];
            }

            // If no lower step available (patient cyl is at or below minimum), use nearest
            let best = steps[0];
            let bestDiff = Math.abs(absCyl - steps[0]);
            for (const s of steps) {
                const diff = Math.abs(absCyl - s);
                if (diff < bestDiff) {
                    best = s;
                    bestDiff = diff;
                }
            }

            return -best;
        }

        function snapAxis(patientAxis, lens) {
            if (!lens.axes) return parseInt(patientAxis) || 180;

            const stepMatch = lens.axes.match(/(\d+)\u00B0\s*steps/i);
            const step = stepMatch ? parseInt(stepMatch[1]) : 10;
            const ax = parseInt(patientAxis) || 180;

            const snapped = Math.round(ax / step) * step;
            if (snapped === 0) return 180;
            if (snapped > 180) return 180;
            return snapped;
        }

        function suggestAddType(addPower, addTypes) {
            if (!addTypes || addTypes.length === 0) return null;

            const add = parseFloat(addPower) || 0;

            if (addTypes.length === 3) {
                if (add <= 1.25) return addTypes[0];
                if (add <= 2.00) return addTypes[1];
                return addTypes[2];
            }

            if (addTypes.length === 2) {
                if (add <= 1.75) return addTypes[0];
                return addTypes[1];
            }

            return addTypes[0];
        }

        function renderOrderDetail() {
            const lens = LENSES.find(l => l.name === state.selectedLens);

            if (!lens) {
                state.selectedLens = null;
                return renderResultsStep();
            }

            let odOk = isLensCompatibleWithEye(lens, state.od);
            let osOk = isLensCompatibleWithEye(lens, state.os);

            // In non-adapt mode, check SE compatibility instead
            if (state.nonAdaptFrom) {
                const odSph = parseFloat(state.od.sphere) || 0;
                const odCyl = parseFloat(state.od.cylinder) || 0;
                const odSE = snapTo025(vertexConvert(odSph) + odCyl / 2);
                odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;

                const osSph = parseFloat(state.os.sphere) || 0;
                const osCyl = parseFloat(state.os.cylinder) || 0;
                const osSE = snapTo025(vertexConvert(osSph) + osCyl / 2);
                osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
            }

            const bc = brandClass(lens.brand);
            const brandColor = { alcon:"var(--alcon)", bl:"var(--bl)", cv:"var(--cv)", jj:"var(--jj)" }[bc];

            // Build order params for one eye
            function buildEyeParams(eye, isDominant, eyeLabel) {
                const sph = parseFloat(eye.sphere) || 0;
                const cyl = parseFloat(eye.cylinder) || 0;
                const addP = parseFloat(eye.add) || 0;
                let clSph = snapTo025(vertexConvert(sph));
                const vertexApplied = Math.abs(sph) >= 4;
                const foldCyl = cyl !== 0 && (lens.type === "sphere" || lens.type === "multifocal");

                // SE adjustment: fold cyl into sphere for non-toric lenses
                if (foldCyl) {
                    clSph = snapTo025(clSph + cyl / 2);
                }

                let params = [];
                let finalSph = clSph;
                const notes = [];
                if (vertexApplied) notes.push(`Vertexed`);
                if (foldCyl) notes.push(`SE: ${cyl.toFixed(2)} cyl folded in`);
                let sphNote = notes.length > 0 ? notes.join("; ") : null;
                let sphHighlight = vertexApplied || foldCyl;

                if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylDiff = clCyl - cyl;
                    if (Math.abs(cylDiff) > 0.01) {
                        const seAdj = snapTo025(-cylDiff / 2);
                        finalSph = snapTo025(clSph + seAdj);
                        const parts = [];
                        if (vertexApplied) parts.push(`Vertexed`);
                        parts.push(`SE adjusted ${seAdj > 0 ? "+" : ""}${seAdj.toFixed(2)} for cyl reduction`);
                        sphNote = parts.join("; ");
                        sphHighlight = true;
                    }
                }

                params.push({
                    label: "Sphere (SPH)",
                    value: `${finalSph > 0 ? "+" : ""}${finalSph.toFixed(2)}`,
                    note: sphNote,
                    highlight: sphHighlight
                });

                if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylChanged = clCyl !== cyl;
                    params.push({
                        label: "Cylinder (CYL)",
                        value: clCyl.toFixed(2),
                        note: cylChanged ? `Reduced from Rx ${cyl.toFixed(2)}` : null,
                        highlight: cylChanged
                    });

                    const rxAxis = eye.cylSign === '+' ? eye.transposedAxis : eye.axis;
                    const clAxis = snapAxis(rxAxis, lens);
                    const axisChanged = clAxis !== (parseInt(rxAxis) || 180);
                    params.push({
                        label: "Axis",
                        value: `${clAxis}\u00B0`,
                        note: axisChanged ? `Snapped from ${rxAxis}\u00B0` : null,
                        highlight: axisChanged
                    });
                }

                if (lens.type === "multifocal" || lens.type === "multifocal-toric") {
                    if (lens.fittingGuide && lens.fittingGuide.addTable) {
                        const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                        if (row && isDominant !== null) {
                            const design = isDominant ? row.dominant : row.nonDominant;
                            const designDesc = design === 'D' ? 'Distance-center' : design === 'N' ? 'Near-center' : design;
                            const addValue = design === 'D' || design === 'N' ? `${row.clAdd} ${design}` : design;
                            params.push({
                                label: "Add",
                                value: addValue,
                                note: `${isDominant ? 'Dominant Eye' : 'Non-dominant Eye'} \u00B7 ${designDesc}`,
                                highlight: true
                            });
                        } else if (row) {
                            params.push({
                                label: "Add",
                                value: row.clAdd,
                                note: `Spec add +${addP.toFixed(2)} \u00B7 Select dominant eye for recommendation`,
                                highlight: true
                            });
                        } else {
                            const addType = suggestAddType(addP, lens.addTypes);
                            params.push({
                                label: "Add",
                                value: addType || `+${addP.toFixed(2)}`,
                                note: addType ? `Based on +${addP.toFixed(2)} add power` : null,
                                highlight: true
                            });
                        }
                    } else {
                        const addType = suggestAddType(addP, lens.addTypes);
                        params.push({
                            label: "Add",
                            value: addType || `+${addP.toFixed(2)}`,
                            note: addType ? `Based on +${addP.toFixed(2)} add power` : null,
                            highlight: true
                        });
                    }
                }

                // Apply troubleshoot adjustments
                if (state.tsAdjustment && state.tsAdjustment.overrides[eyeLabel]) {
                    const adj = state.tsAdjustment.overrides[eyeLabel];
                    if (adj.sphDelta !== undefined) {
                        const sphParam = params.find(p => p.label === "Sphere (SPH)");
                        if (sphParam) {
                            const oldVal = parseFloat(sphParam.value);
                            const newVal = snapTo025(oldVal + adj.sphDelta);
                            sphParam.note = (sphParam.note ? sphParam.note + "; " : "") + `Adjusted ${adj.sphDelta > 0 ? "+" : ""}${adj.sphDelta.toFixed(2)}`;
                            sphParam.value = `${newVal > 0 ? "+" : ""}${newVal.toFixed(2)}`;
                            sphParam.highlight = true;
                        }
                    }
                    if (adj.addOverride !== undefined) {
                        const addParam = params.find(p => p.label === "Add");
                        if (addParam) {
                            addParam.value = adj.addOverride;
                            addParam.note = (addParam.note ? addParam.note + "; " : "") + "Adjusted for troubleshoot";
                            addParam.highlight = true;
                        }
                    }
                    if (adj.designOverride !== undefined) {
                        const addParam = params.find(p => p.label === "Add");
                        if (addParam) {
                            addParam.value = addParam.value.replace(/ [DN]$/, ` ${adj.designOverride}`);
                            const desc = adj.designOverride === 'D' ? 'Distance-center' : 'Near-center';
                            addParam.note = `${isDominant ? 'Dominant Eye' : 'Non-dominant Eye'} \u00B7 ${desc} (adjusted)`;
                            addParam.highlight = true;
                        }
                    }
                    if (adj.axisOverride !== undefined) {
                        const axisParam = params.find(p => p.label === "Axis");
                        if (axisParam) {
                            axisParam.note = `Rotation compensated from ${axisParam.value}`;
                            axisParam.value = `${adj.axisOverride}\u00B0`;
                            axisParam.highlight = true;
                        }
                    }
                }

                return { params, vertexApplied };
            }

            // Determine dominant status per eye: OD = right, OS = left
            const odDominant = state.dominantEye === 'right' ? true : state.dominantEye === 'left' ? false : null;
            const osDominant = state.dominantEye === 'left' ? true : state.dominantEye === 'right' ? false : null;

            let eyeSectionsHtml = '';
            const notes = [];

            if (odOk) {
                const { params, vertexApplied } = buildEyeParams(state.od, odDominant, "OD");
                const html = params.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                    <div class="order-param-label">${p.label}</div>
                    <div class="order-param-value">${p.value}</div>
                    ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
                </div>`).join("");
                eyeSectionsHtml += `<div class="order-section-title">OD (Right Eye) \u2014 Order Parameters</div>
                    <div class="order-grid">${html}</div>`;
                if (vertexApplied) notes.push("Vertex conversion applied at 12mm vertex distance.");
            }

            if (osOk) {
                const { params, vertexApplied } = buildEyeParams(state.os, osDominant, "OS");
                const html = params.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                    <div class="order-param-label">${p.label}</div>
                    <div class="order-param-value">${p.value}</div>
                    ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
                </div>`).join("");
                eyeSectionsHtml += `<div class="order-section-title">OS (Left Eye) \u2014 Order Parameters</div>
                    <div class="order-grid">${html}</div>`;
                if (vertexApplied && !notes.includes("Vertex conversion applied at 12mm vertex distance.")) notes.push("Vertex conversion applied at 12mm vertex distance.");
            }

            // Shared lens specs
            const bcs = lens.bc.split("/").map(s => s.trim());
            let sharedParams = [];
            sharedParams.push({
                label: "Base Curve",
                value: bcs.length > 1 ? bcs[0] : lens.bc,
                note: bcs.length > 1 ? `Also available: ${bcs[1]}` : null
            });
            sharedParams.push({
                label: "Diameter",
                value: lens.diam
            });
            const sharedHtml = sharedParams.map(p => `<div class="order-param ${p.highlight ? 'highlight' : ''}">
                <div class="order-param-label">${p.label}</div>
                <div class="order-param-value">${p.value}</div>
                ${p.note ? `<div class="order-param-note">${p.note}</div>` : ""}
            </div>`).join("");

            if (bcs.length > 1) notes.push(`This lens comes in ${bcs.length} base curves. Trial fit may determine optimal BC.`);

            let notesHtml = "";
            if (notes.length) {
                notesHtml = `<div class="order-note-box"><strong>\u26A0 Notes:</strong> ${notes.join(" ")}</div>`;
            }

            const yearlyCost = formatYearlyCost(lens);
            const infoItems = [
                { label: "Modality", value: lens.modality },
                { label: "Dk/t", value: lens.dk },
                { label: "Material", value: lens.material || "—" },
                { label: "Wear", value: lens.wear },
                { label: "Pack Sizes", value: lens.qty },
                { label: "Price/Pack", value: "~" + lens.price },
                ...(yearlyCost ? [{ label: "Annual Cost", value: `${yearlyCost}` }] : []),
            ];

            const infoHtml = infoItems.map(i => `<div class="order-info-item">
                <div class="order-info-label">${i.label}</div>
                <div class="order-info-value">${i.value}</div>
            </div>`).join("");

            const isAdjusted = state.tsAdjustment !== null;
            const isNonAdapt = state.nonAdaptFrom !== null;
            const adjBanner = isAdjusted ? `<div class="order-note-box" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success)"><strong>Adjusted Order:</strong> ${state.tsAdjustment.title}</div>` : '';
            const nonAdaptBanner = isNonAdapt ? `<div class="order-note-box" style="background:var(--success-bg);border-color:var(--success-border);color:var(--success)"><strong>Non-Adapt Conversion:</strong> Cylinder folded into sphere via spherical equivalent</div>` : '';

            return `<div class="order-detail">
                ${isNonAdapt
                    ? `<button class="order-back-btn" onclick="backToNonAdapt()"><i class="ph-duotone ph-arrow-left"></i> Back to Troubleshooting</button>`
                    : isAdjusted
                    ? `<button class="order-back-btn" onclick="backToTroubleshoot()"><i class="ph-duotone ph-arrow-left"></i> Back to Troubleshooting</button>`
                    : `<button class="order-back-btn" onclick="deselectLens()"><i class="ph-duotone ph-arrow-left"></i> Back to Results</button>`}
                <div class="order-lens-name">${lens.name}</div>
                <div class="order-lens-brand" style="color:${brandColor}">${lens.brand}</div>

                ${adjBanner}${nonAdaptBanner}

                ${eyeSectionsHtml}

                ${isAdjusted || isNonAdapt || lens.type === 'sphere' ? '' : `<button class="troubleshoot-btn" onclick="openTroubleshoot()"><i class="ph-duotone ph-wrench"></i> Troubleshoot Vision</button>`}

                <div class="order-section-title">Lens Specifications</div>
                <div class="order-grid">${sharedHtml}</div>

                <div class="order-section-title">Lens Details</div>
                <div class="order-lens-info">${infoHtml}</div>

                ${notesHtml}
            </div>`;
        }

        // TROUBLESHOOT
        function openTroubleshoot() {
            state.troubleshoot = "select";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backFromTroubleshoot() {
            state.troubleshoot = null;
            state.tsRotation = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function applyTsAdjustment(index) {
            const s = window._tsSuggestions[index];
            if (!s) return;
            state.tsAdjustment = { title: s.title, overrides: s.adjustments, complaint: state.troubleshoot };
            state.troubleshoot = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backToTroubleshoot() {
            const complaint = state.tsAdjustment ? state.tsAdjustment.complaint : "select";
            state.tsAdjustment = null;
            state.troubleshoot = complaint || "select";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function setTroubleshoot(complaint) {
            state.troubleshoot = state.troubleshoot === complaint ? "select" : complaint;
            state.tsRotation = null;
            render();
        }

        function setRotationDir(eyeLabel, dir) {
            if (!state.tsRotation || !state.tsRotation[eyeLabel]) return;
            state.tsRotation[eyeLabel].dir = state.tsRotation[eyeLabel].dir === dir ? null : dir;
            render();
        }

        function setRotationDeg(eyeLabel, deg) {
            if (!state.tsRotation || !state.tsRotation[eyeLabel]) return;
            state.tsRotation[eyeLabel].deg = state.tsRotation[eyeLabel].deg === deg ? null : deg;
            render();
        }

        function applyRotationAdjustment() {
            if (!window._tsRotationAdj) return;
            state.tsAdjustment = { ...window._tsRotationAdj, complaint: state.troubleshoot };
            state.troubleshoot = null;
            state.tsRotation = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function getNonAdaptLenses() {
            const results = [];
            LENSES.forEach(lens => {
                if (lens.type === "toric" || lens.type === "multifocal-toric" || lens.type === "myopia-mgmt") return;
                if (state.modality.length > 0 && !state.modality.includes(lens.modality)) return;
                if (!state.brands.includes(lens.brand)) return;

                let odOk = false, osOk = false;

                const odSph = parseFloat(state.od.sphere) || 0;
                const odCyl = parseFloat(state.od.cylinder) || 0;
                const odAdd = parseFloat(state.od.add) || 0;
                const odSE = snapTo025(vertexConvert(odSph) + odCyl / 2);
                if (odAdd > 0 && lens.type === "multifocal") {
                    odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;
                } else if (!odAdd && lens.type === "sphere") {
                    odOk = odSE >= lens.sphMin && odSE <= lens.sphMax;
                }

                const osSph = parseFloat(state.os.sphere) || 0;
                const osCyl = parseFloat(state.os.cylinder) || 0;
                const osAdd = parseFloat(state.os.add) || 0;
                const osSE = snapTo025(vertexConvert(osSph) + osCyl / 2);
                if (osAdd > 0 && lens.type === "multifocal") {
                    osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
                } else if (!osAdd && lens.type === "sphere") {
                    osOk = osSE >= lens.sphMin && osSE <= lens.sphMax;
                }

                if (odOk || osOk) {
                    results.push({ ...lens, forOD: odOk, forOS: osOk });
                }
            });

            const dir = state.sortDir === "asc" ? 1 : -1;
            return results.sort((a, b) => {
                if (state.sortBy === "dk") return (a.dk - b.dk) * dir;
                if (state.sortBy === "brand") return a.brand.localeCompare(b.brand) * dir;
                if (state.sortBy === "name") return a.name.localeCompare(b.name) * dir;
                if (state.sortBy === "price") {
                    const va = calcYearlyCost(a) || 99999;
                    const vb = calcYearlyCost(b) || 99999;
                    return (va - vb) * dir;
                }
                return 0;
            });
        }

        function selectNonAdaptLens(name) {
            state.nonAdaptFrom = state.selectedLens;
            state.selectedLens = name;
            state.troubleshoot = null;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function backToNonAdapt() {
            state.selectedLens = state.nonAdaptFrom;
            state.nonAdaptFrom = null;
            state.troubleshoot = 'nonadapt';
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function renderTroubleshootStep() {
            const lens = LENSES.find(l => l.name === state.selectedLens);
            if (!lens) {
                state.troubleshoot = null;
                state.selectedLens = null;
                return renderResultsStep();
            }

            const bc = brandClass(lens.brand);
            const brandColor = { alcon:"var(--alcon)", bl:"var(--bl)", cv:"var(--cv)", jj:"var(--jj)" }[bc];
            const odOk = isLensCompatibleWithEye(lens, state.od);
            const osOk = isLensCompatibleWithEye(lens, state.os);
            const odDominant = state.dominantEye === 'right' ? true : state.dominantEye === 'left' ? false : null;
            const osDominant = state.dominantEye === 'left' ? true : state.dominantEye === 'right' ? false : null;

            function getCurrentSph(eye) {
                const sph = parseFloat(eye.sphere) || 0;
                const cyl = parseFloat(eye.cylinder) || 0;
                let clSph = snapTo025(vertexConvert(sph));
                if (cyl !== 0 && Math.abs(cyl) === 0.50) {
                    clSph = snapTo025(clSph + cyl / 2);
                } else if (lens.type === "toric" || lens.type === "multifocal-toric") {
                    const clCyl = snapCyl(cyl, lens);
                    const cylDiff = clCyl - cyl;
                    if (Math.abs(cylDiff) > 0.01) {
                        const seAdj = snapTo025(-cylDiff / 2);
                        clSph = snapTo025(clSph + seAdj);
                    }
                }
                return clSph;
            }

            function getCurrentAdd(eye, isDominant) {
                const addP = parseFloat(eye.add) || 0;
                if (lens.type !== "multifocal" && lens.type !== "multifocal-toric") return null;
                if (lens.fittingGuide && lens.fittingGuide.addTable) {
                    const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                    if (row && isDominant !== null) return isDominant ? row.dominant : row.nonDominant;
                    if (row) return row.clAdd;
                }
                return suggestAddType(addP, lens.addTypes);
            }

            let _tsSuggestions = [];

            const isToric = lens.type === "toric" || lens.type === "multifocal-toric";

            // Check if non-adapt option should show (toric lens, all compatible eyes cyl ≤ 1.25)
            const odCylAbs = Math.abs(parseFloat(state.od.cylinder) || 0);
            const osCylAbs = Math.abs(parseFloat(state.os.cylinder) || 0);
            const maxCyl = Math.max(odOk ? odCylAbs : 0, osOk ? osCylAbs : 0);
            const showNonAdapt = isToric && maxCyl > 0 && maxCyl <= 1.25;

            // Complaint selection cards
            let complaintHtml = `
                <div style="margin-bottom:20px">
                    <div class="order-section-title">Select Vision Complaint</div>
                    <div class="option-grid">
                        <div class="option-btn ${state.troubleshoot === 'distance' ? 'active' : ''}" onclick="setTroubleshoot('distance')">
                            <div class="icon"><i class="ph-duotone ph-eye"></i></div>
                            <div class="title">Blurry at Distance</div>
                            <div class="desc">Difficulty seeing far away</div>
                        </div>
                        <div class="option-btn ${state.troubleshoot === 'near' ? 'active' : ''}" onclick="setTroubleshoot('near')">
                            <div class="icon"><i class="ph-duotone ph-book-open"></i></div>
                            <div class="title">Blurry at Near</div>
                            <div class="desc">Difficulty reading or close work</div>
                        </div>
                        ${isToric ? `<div class="option-btn ${state.troubleshoot === 'rotation' ? 'active' : ''}" onclick="setTroubleshoot('rotation')">
                            <div class="icon"><i class="ph-duotone ph-arrows-clockwise"></i></div>
                            <div class="title">Lens Rotation</div>
                            <div class="desc">Toric lens rotating on eye</div>
                        </div>` : ''}
                        ${showNonAdapt ? `<div class="option-btn ${state.troubleshoot === 'nonadapt' ? 'active' : ''}" onclick="setTroubleshoot('nonadapt')">
                            <div class="icon"><i class="ph-duotone ph-arrows-clockwise"></i></div>
                            <div class="title">Non-Adapt to Toric</div>
                            <div class="desc">Convert to spherical equivalent</div>
                        </div>` : ''}
                    </div>
                </div>`;

            let suggestionsHtml = '';

            if (state.troubleshoot === 'distance' || state.troubleshoot === 'near') {
                const isDistance = state.troubleshoot === 'distance';
                const suggestions = [];

                const eyes = [];
                if (odOk) eyes.push({ eye: state.od, label: "OD", isDominant: odDominant });
                if (osOk) eyes.push({ eye: state.os, label: "OS", isDominant: osDominant });

                const sphAdj = isDistance ? -0.25 : +0.25;
                const sphAdjLabel = isDistance ? "\u22120.25D" : "+0.25D";

                // Determine primary eye for adjustment
                let primaryEye = null;
                let secondaryEye = null;

                if (eyes.length >= 2) {
                    if (isDistance) {
                        primaryEye = eyes.find(e => e.isDominant === true);
                        secondaryEye = eyes.find(e => e.isDominant === false);
                    } else {
                        primaryEye = eyes.find(e => e.isDominant === false);
                        secondaryEye = eyes.find(e => e.isDominant === true);
                    }
                }

                if (primaryEye && secondaryEye) {
                    const currentSph = getCurrentSph(primaryEye.eye);
