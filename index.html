                    const newSph = snapTo025(currentSph + sphAdj);
                    suggestions.push({
                        title: `Add ${sphAdjLabel} to ${primaryEye.label} sphere`,
                        rationale: `Adjust ${primaryEye.isDominant ? 'dominant' : 'non-dominant'} eye first`,
                        adjustments: { [primaryEye.label]: { sphDelta: sphAdj } },
                        changes: [{
                            eye: primaryEye.label, param: "Sphere",
                            from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                            to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}`
                        }]
                    });

                    const current2 = getCurrentSph(secondaryEye.eye);
                    const new2 = snapTo025(current2 + sphAdj);
                    suggestions.push({
                        title: `Add ${sphAdjLabel} to both eyes`,
                        rationale: `If single-eye adjustment is insufficient`,
                        adjustments: { [primaryEye.label]: { sphDelta: sphAdj }, [secondaryEye.label]: { sphDelta: sphAdj } },
                        changes: [
                            { eye: primaryEye.label, param: "Sphere",
                              from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                              to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}` },
                            { eye: secondaryEye.label, param: "Sphere",
                              from: `${current2 > 0 ? "+" : ""}${current2.toFixed(2)}`,
                              to: `${new2 > 0 ? "+" : ""}${new2.toFixed(2)}` }
                        ]
                    });
                } else {
                    eyes.forEach(e => {
                        const currentSph = getCurrentSph(e.eye);
                        const newSph = snapTo025(currentSph + sphAdj);
                        suggestions.push({
                            title: `Add ${sphAdjLabel} to ${e.label} sphere`,
                            rationale: isDistance ? 'More minus power for distance clarity' : 'More plus power for near clarity',
                            adjustments: { [e.label]: { sphDelta: sphAdj } },
                            changes: [{
                                eye: e.label, param: "Sphere",
                                from: `${currentSph > 0 ? "+" : ""}${currentSph.toFixed(2)}`,
                                to: `${newSph > 0 ? "+" : ""}${newSph.toFixed(2)}`
                            }]
                        });
                    });
                }

                // Add power suggestions for multifocal lenses
                if (lens.type === "multifocal" || lens.type === "multifocal-toric") {
                    const addTypes = lens.addTypes;
                    if (addTypes && addTypes.length > 1) {
                        eyes.forEach(e => {
                            const currentAdd = getCurrentAdd(e.eye, e.isDominant);
                            if (!currentAdd) return;
                            const currentIdx = addTypes.indexOf(currentAdd);
                            if (currentIdx === -1) return;

                            if (isDistance && currentIdx > 0) {
                                const newAdd = addTypes[currentIdx - 1];
                                suggestions.push({
                                    title: `Lower ${e.label} add power`,
                                    rationale: `Reduce add from ${currentAdd} to ${newAdd} for clearer distance`,
                                    adjustments: { [e.label]: { addOverride: newAdd } },
                                    changes: [{ eye: e.label, param: "Add", from: currentAdd, to: newAdd }]
                                });
                            }
                            if (!isDistance && currentIdx < addTypes.length - 1) {
                                const newAdd = addTypes[currentIdx + 1];
                                suggestions.push({
                                    title: `Increase ${e.label} add power`,
                                    rationale: `Increase add from ${currentAdd} to ${newAdd} for clearer near`,
                                    adjustments: { [e.label]: { addOverride: newAdd } },
                                    changes: [{ eye: e.label, param: "Add", from: currentAdd, to: newAdd }]
                                });
                            }
                        });
                    }

                    // D/N design swaps for MF-toric with fitting guide
                    if (lens.fittingGuide && lens.fittingGuide.addTable) {
                        eyes.forEach(e => {
                            const addP = parseFloat(e.eye.add) || 0;
                            const row = lens.fittingGuide.addTable.find(r => addP >= r.specAddMin && addP <= r.specAddMax);
                            if (!row || e.isDominant === null) return;
                            const currentDesign = e.isDominant ? row.dominant : row.nonDominant;

                            if (isDistance && currentDesign === 'N') {
                                suggestions.push({
                                    title: `Switch ${e.label} to Distance design`,
                                    rationale: `Change ${e.isDominant ? 'dominant' : 'non-dominant'} eye from Near-center to Distance-center`,
                                    adjustments: { [e.label]: { designOverride: "D" } },
                                    changes: [{ eye: e.label, param: "Design", from: "N (Near-center)", to: "D (Distance-center)" }]
                                });
                            }
                            if (!isDistance && currentDesign === 'D') {
                                suggestions.push({
                                    title: `Switch ${e.label} to Near design`,
                                    rationale: `Change ${e.isDominant ? 'dominant' : 'non-dominant'} eye from Distance-center to Near-center`,
                                    adjustments: { [e.label]: { designOverride: "N" } },
                                    changes: [{ eye: e.label, param: "Design", from: "D (Distance-center)", to: "N (Near-center)" }]
                                });
                            }
                        });
                    }
                }

                // Build suggestions HTML
                _tsSuggestions = suggestions;
                window._tsSuggestions = _tsSuggestions;
                if (suggestions.length > 0) {
                    suggestionsHtml = `<div class="order-section-title">${isDistance ? 'Distance' : 'Near'} Vision Adjustments</div>`;
                    suggestionsHtml += suggestions.map((s, i) => {
                        const changesHtml = s.changes.map(c =>
                            `<div class="ts-change">
                                <span class="ts-change-eye">${c.eye}</span>
                                <span class="ts-change-param">${c.param}:</span>
                                <span class="ts-change-from">${c.from}</span>
                                <span class="ts-change-arrow">\u2192</span>
                                <span class="ts-change-to">${c.to}</span>
                            </div>`
                        ).join("");
                        return `<div class="troubleshoot-suggestion fade-in">
                            <div class="ts-step">${i + 1}</div>
                            <div class="ts-body">
                                <div class="ts-title">${s.title}</div>
                                <div class="ts-rationale">${s.rationale}</div>
                                <div class="ts-changes">${changesHtml}</div>
                                <button class="lens-select-btn" style="margin-top:10px;font-size:12px;padding:7px 14px" onclick="applyTsAdjustment(${i})">View Adjusted Results \u2192</button>
                            </div>
                        </div>`;
                    }).join("");
                } else {
                    suggestionsHtml = `<div style="padding:20px;text-align:center;color:var(--ink-muted);font-size:13px">
                        No additional adjustments available for this lens type.
                    </div>`;
                }
            }

            if (state.troubleshoot === 'rotation' && isToric) {
                if (!state.tsRotation) {
                    state.tsRotation = {};
                    if (odOk) state.tsRotation.OD = { dir: null, deg: null };
                    if (osOk) state.tsRotation.OS = { dir: null, deg: null };
                }

                function normalizeAxis(ax) {
                    ax = ax % 180;
                    if (ax <= 0) ax += 180;
                    return ax;
                }

                let rotationHtml = '';
                const eyeEntries = [];
                if (odOk) eyeEntries.push({ eye: state.od, label: "OD", name: "OD (Right Eye)" });
                if (osOk) eyeEntries.push({ eye: state.os, label: "OS", name: "OS (Left Eye)" });

                eyeEntries.forEach(e => {
                    const rot = state.tsRotation[e.label];
                    if (!rot) return;
                    const currentAxis = snapAxis(e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis, lens);

                    let resultHtml = '';
                    if (rot.dir && rot.deg) {
                        const delta = rot.dir === 'left' ? rot.deg : -rot.deg;
                        const newAxis = normalizeAxis(currentAxis + delta);
                        resultHtml = `<div class="vertex-box fade-in" style="margin-top:12px">
                            <div class="vertex-label">Adjusted Axis</div>
                            <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)">
                                ${currentAxis}\u00B0 \u2192 ${newAxis}\u00B0
                            </div>
                            <div style="margin-top:4px;font-size:11px;color:var(--ink-muted)">
                                Rotated ${rot.deg}\u00B0 ${rot.dir} \u00B7 LARS compensation
                            </div>
                        </div>`;
                    }

                    rotationHtml += `
                        <div class="eye-section">
                            <div class="eye-header">${e.name}</div>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Current Axis</label>
                                    <div style="font-family:var(--mono);font-size:18px;font-weight:700;padding:11px 0">${currentAxis}\u00B0</div>
                                </div>
                                <div class="form-group">
                                    <label>Direction</label>
                                    <div class="input-row" style="gap:6px">
                                        <button type="button" class="dom-toggle ${rot.dir === 'left' ? 'active-left' : ''}" style="flex:1" onclick="setRotationDir('${e.label}','left')"><i class="ph-duotone ph-arrow-left"></i> Left</button>
                                        <button type="button" class="dom-toggle ${rot.dir === 'right' ? 'active-right' : ''}" style="flex:1" onclick="setRotationDir('${e.label}','right')">Right <i class="ph-duotone ph-arrow-right"></i></button>
                                    </div>
                                </div>
                                <div class="form-group" style="grid-column:1/-1">
                                    <label>Degrees Rotated</label>
                                    <div class="input-row" style="gap:6px">
                                        <button type="button" class="dom-toggle ${rot.deg === 10 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',10)">10\u00B0</button>
                                        <button type="button" class="dom-toggle ${rot.deg === 20 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',20)">20\u00B0</button>
                                        <button type="button" class="dom-toggle ${rot.deg === 30 ? 'active-left' : ''}" style="flex:1" onclick="setRotationDeg('${e.label}',30)">30\u00B0</button>
                                    </div>
                                </div>
                            </div>
                            ${resultHtml}
                        </div>`;
                });

                const hasSelection = eyeEntries.some(e => {
                    const rot = state.tsRotation[e.label];
                    return rot && rot.dir && rot.deg;
                });

                let viewBtnHtml = '';
                if (hasSelection) {
                    const overrides = {};
                    const parts = [];
                    eyeEntries.forEach(e => {
                        const rot = state.tsRotation[e.label];
                        if (rot && rot.dir && rot.deg) {
                            const currentAxis = snapAxis(e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis, lens);
                            const delta = rot.dir === 'left' ? rot.deg : -rot.deg;
                            overrides[e.label] = { axisOverride: normalizeAxis(currentAxis + delta) };
                            parts.push(`${e.label}: ${rot.deg}\u00B0 ${rot.dir}`);
                        }
                    });
                    window._tsRotationAdj = { title: `Axis rotation: ${parts.join(', ')}`, overrides };
                    viewBtnHtml = `<button class="lens-select-btn" style="margin-top:16px;width:100%;justify-content:center" onclick="applyRotationAdjustment()">View Adjusted Results \u2192</button>`;
                }

                suggestionsHtml = rotationHtml + viewBtnHtml;
            }

            // NON-ADAPT TO TORIC
            if (state.troubleshoot === 'nonadapt') {
                const eyeEntries = [];
                if (odOk) eyeEntries.push({ eye: state.od, label: "OD", name: "OD (Right Eye)" });
                if (osOk) eyeEntries.push({ eye: state.os, label: "OS", name: "OS (Left Eye)" });

                // SE conversion summary
                let seHtml = '<div class="vertex-box fade-in" style="margin-bottom:20px"><div class="vertex-label">Spherical Equivalent Conversion</div>';
                eyeEntries.forEach(e => {
                    const sph = parseFloat(e.eye.sphere) || 0;
                    const cyl = parseFloat(e.eye.cylinder) || 0;
                    const clSph = vertexConvert(sph);
                    const seSph = snapTo025(clSph + cyl / 2);
                    const sphStr = `${clSph > 0 ? "+" : ""}${clSph.toFixed(2)}`;
                    const cylStr = `${cyl.toFixed(2)}`;
                    const seStr = `${seSph > 0 ? "+" : ""}${seSph.toFixed(2)}`;
                    const seAxis = e.eye.cylSign === '+' ? e.eye.transposedAxis : e.eye.axis;
                    seHtml += `<div style="margin-top:8px"><strong>${e.label}:</strong> <span style="font-family:var(--mono)">${sphStr} ${cylStr}${seAxis ? ` x ${seAxis}\u00B0` : ''}</span> \u2192 <span style="font-family:var(--mono);font-weight:700;color:var(--accent)">${seStr} (sphere)</span></div>`;
                });
                seHtml += '</div>';

                // Find compatible non-toric lenses
                const nonAdaptLenses = getNonAdaptLenses();
                let listHtml;
                if (nonAdaptLenses.length === 0) {
                    listHtml = `<div class="empty"><div class="empty-icon"><i class="ph-duotone ph-magnifying-glass"></i></div><div class="empty-title">No spherical lenses match this SE prescription</div><div class="empty-desc">Try expanding your brand or modality selection</div></div>`;
                } else {
                    listHtml = `<div class="lens-list">${nonAdaptLenses.map(l => renderLensCard(l).replace(/selectLens\(/g, 'selectNonAdaptLens(')).join("")}</div>`;
                }

                suggestionsHtml = `${seHtml}
                    <div class="results-header"><div>
                        <div class="results-count">${nonAdaptLenses.length} Compatible Spherical Lens${nonAdaptLenses.length !== 1 ? 'es' : ''}</div>
                    </div></div>
                    ${listHtml}`;
            }

            return `<div class="order-detail">
                <button class="order-back-btn" onclick="backFromTroubleshoot()"><i class="ph-duotone ph-arrow-left"></i> Back to Results</button>
                <div class="order-lens-name">${lens.name}</div>
                <div class="order-lens-brand" style="color:${brandColor}">${lens.brand}</div>
                ${complaintHtml}
                ${suggestionsHtml}
            </div>`;
        }

        // NAVIGATION
        function goBack() {
            if (state.step > 0) {
                state.selectedLens = null;
                state.troubleshoot = null;
                state.tsAdjustment = null;
                state.tsRotation = null;
                state.step--;
                render();
            }
        }

        function goNext() {
            if (state.step === 3) {
                state = {
                    step: 0,
                    od: newEye(),
                    os: newEye(),
                    dominantEye: null,
                    modality: [],
                    brands: [...BRANDS],
                    selectedLens: null,
                    hasVisitedResults: false,
                    troubleshoot: null,
                    tsAdjustment: null,
                    tsRotation: null,
                    nonAdaptFrom: null,
                    sortBy: "dk",
                    sortDir: "desc"
                };
                render();
                return;
            }

            // sphere always has a value from dropdown

            if (state.step < 3) {
                if (state.step === 1) {
                    state.brands = getBrandsWithResults();
                    if (state.brands.length === 0) state.brands = [...BRANDS];
                }
                state.step++;
                render();
            }
        }

        function resetAll() {
            state = {
                step: 0,
                od: newEye(),
                os: newEye(),
                dominantEye: null,
                modality: [],
                brands: [...BRANDS],
                selectedLens: null,
                hasVisitedResults: false,
                troubleshoot: null,
                tsAdjustment: null,
                tsRotation: null,
                nonAdaptFrom: null,
                sortBy: "dk",
                sortDir: "desc"
            };
            switchTab('lenses');
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function goToStep(i) {
            if (i <= state.step) {
                state.selectedLens = null;
                state.troubleshoot = null;
                state.tsAdjustment = null;
                state.tsRotation = null;
                state.step = i;
                render();
            }
        }

        function switchTab(tab) {
            document.getElementById('subnavLenses').classList.toggle('active', tab === 'lenses');
            document.getElementById('subnavMeds').classList.toggle('active', tab === 'meds');
            if (tab === 'lenses') {
                document.querySelector('.main').style.display = '';
                document.getElementById('medsPage').style.display = 'none';
            } else {
                document.querySelector('.main').style.display = 'none';
                document.getElementById('medsPage').style.display = '';
                medsState.paStep = 0;
                medsState.selectedConditionGroup = null;
                medsState.filters = { genericOnly:false, preservativeFree:false, drugClass:null, subCondition:null, route:null };
                medsState.categorySearch = "";
                renderMeds();
            }
        }

        // ===== MEDICATIONS TAB =====

        function renderMeds() {
            const el = document.getElementById('medsContent');
            const activeId = document.activeElement ? document.activeElement.id : null;
            let html = '';
            html += renderMedPrescribingAid();
            html += `<div class="med-footer">Pricing is approximate cash pricing without insurance. Always verify current pricing and clinical appropriateness before prescribing.</div>`;
            el.innerHTML = html;
            bindMedEvents();
            if (activeId) {
                const restore = document.getElementById(activeId);
                if (restore) { restore.focus(); restore.setSelectionRange(restore.value.length, restore.value.length); }
            }
        }

        function getMedLookupResults() {
            let results = MEDS;
            if (medsState.showFavoritesOnly) {
                results = results.filter(m => medsState.favorites.includes(m.id));
            }
            if (medsState.searchQuery.trim()) {
                const q = medsState.searchQuery.trim().toLowerCase();
                results = results.filter(m =>
                    m.brand_name.toLowerCase().includes(q) ||
                    m.generic_name.toLowerCase().includes(q) ||
                    m.drug_class.toLowerCase().includes(q)
                );
            }
            return results;
        }

        function getMedAutocomplete(query) {
            if (!query || query.length < 2) return [];
            const q = query.toLowerCase();
            return MEDS.filter(m =>
                m.brand_name.toLowerCase().includes(q) ||
                m.generic_name.toLowerCase().includes(q)
            ).slice(0, 8);
        }

        // === Prescribing Aid ===

        function renderMedPrescribingAid() {
            let html = '';

            if (medsState.paStep === 0) {
                html += renderMedConditionStep();
            } else {
                html += renderMedFilterStep();
            }

            return html;
        }

        function renderMedConditionStep() {
            let html = `<div class="med-search-wrap">
                <span class="med-search-icon"><i class="ph-duotone ph-magnifying-glass"></i></span>
                <input type="text" class="med-search-input" id="medSearchInput" placeholder="Search by brand or generic name\u2026" value="${escMedHtml(medsState.searchQuery)}" autocomplete="off">
                <button class="med-search-fav ${medsState.showFavoritesOnly?'active':''}" onclick="toggleMedFavoritesOnly()" title="Favorites${medsState.favorites.length ? ' ('+medsState.favorites.length+')' : ''}"><i class="ph-duotone ph-star"></i></button>
                <div class="med-autocomplete" id="medAutocomplete" style="display:none"></div>
            </div>`;
            if (medsState.showFavoritesOnly) {
                const favResults = MEDS.filter(m => medsState.favorites.includes(m.id));
                html += `<div class="results-header"><div><div class="results-count">${favResults.length} Favorite${favResults.length!==1?'s':''}</div></div></div>`;
                if (favResults.length === 0) {
                    html += `<div class="empty"><div class="empty-icon"><i class="ph-duotone ph-pill"></i></div><div class="empty-title">No favorites yet</div><div class="empty-desc">Star medications to add them here.</div></div>`;
                } else {
                    html += `<div class="lens-list" style="margin-bottom:16px">`;
                    favResults.forEach(med => { html += renderMedCard(med, false); });
                    html += `</div>`;
                }
                return html;
            }
            if (medsState.searchQuery.trim().length >= 2) {
                const results = getMedLookupResults();
                if (results.length > 0) {
                    html += `<div class="results-header"><div><div class="results-count">${results.length} Result${results.length!==1?'s':''}</div></div></div>`;
                    html += `<div class="lens-list" style="margin-bottom:16px">`;
                    results.forEach(med => { html += renderMedCard(med, false); });
                    html += `</div>`;
                    return html;
                }
            }
            html += `<div class="option-grid med-condition-grid">`;
            MED_CONDITION_GROUPS.forEach(g => {
                const count = MEDS.filter(m => g.conditions.includes(m.condition)).length;
                const active = medsState.selectedConditionGroup === g.id;
                html += `<div class="option-btn ${active ? 'active' : ''} ${count===0?'zero':''}" onclick="selectMedCondition('${g.id}')">
                    <div class="icon">${g.icon}</div>
                    <div class="title">${g.label}</div>
                    <div class="count">${count} med${count!==1?'s':''}</div>
                </div>`;
            });
            html += `</div>`;
            return html;
        }

        function renderMedFilterStep() {
            const group = MED_CONDITION_GROUPS.find(g => g.id === medsState.selectedConditionGroup);
            if (!group) return '';
            const allMeds = MEDS.filter(m => group.conditions.includes(m.condition));
            let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                <button class="order-back-btn" onclick="goMedBack()" style="margin-bottom:0;flex-shrink:0"><i class="ph-duotone ph-arrow-left"></i> Back</button>
                <div><div class="card-title" style="margin-bottom:0">${group.icon} ${escMedHtml(group.label)}</div></div>
            </div>`;
            html += `<div class="card" style="margin-bottom:16px">`;

            // Category search bar
            html += `<div class="med-search-wrap" style="margin-bottom:12px">
                <span class="med-search-icon"><i class="ph-duotone ph-magnifying-glass"></i></span>
                <input type="text" class="med-search-input" id="medCategorySearch" placeholder="Search within ${escMedHtml(group.label)}\u2026" value="${escMedHtml(medsState.categorySearch)}" autocomplete="off">
            </div>`;

            // Sub-condition chips for grouped conditions (skip for inflammation which uses class chips instead)
            if (group.conditions.length > 1 && group.id !== 'inflammation') {
                html += `<div class="med-subcondition-section"><div class="med-subcondition-label">Use</div><div class="med-filter-chips">`;
                html += `<button class="med-filter-chip ${medsState.filters.subCondition===null?'active':''}" onclick="toggleMedSubCondition(null)">All</button>`;
                group.conditions.forEach(c => {
                    const info = MED_CONDITIONS[c];
                    const cnt = MEDS.filter(m => m.condition === c).length;
                    html += `<button class="med-filter-chip ${medsState.filters.subCondition===c?'active':''}" onclick="toggleMedSubCondition('${c}')">${info.icon} ${info.label} (${cnt})</button>`;
                });
                html += `</div></div>`;
            }

            // All filter chips in one row — grouped by broad drug class
            html += `<div class="med-subcondition-section"><div class="med-subcondition-label">Class</div><div class="med-filter-chips">`;
            const dcGroups = {};
            allMeds.forEach(m => {
                const g = drugClassGroup(m.drug_class);
                if (!dcGroups[g]) dcGroups[g] = { classes: new Set(), count: 0, sample: m.drug_class };
                dcGroups[g].classes.add(m.drug_class);
                dcGroups[g].count++;
            });
            const groupNames = Object.keys(dcGroups);
            if (groupNames.length > 1) {
                html += `<button class="med-filter-chip ${medsState.filters.drugClass===null?'active':''}" onclick="toggleMedDrugClass(null)">All</button>`;
                const sorted = groupNames.map(g => ({ g, color: getDrugClassColor(dcGroups[g].sample) })).sort((a, b) => a.color.order - b.color.order);
                sorted.forEach(({ g, color }) => {
                    const active = medsState.filters.drugClass === g;
                    html += `<button class="med-filter-chip ${color.cls} ${active?'active':''}" onclick="toggleMedDrugClass(this.dataset.dc)" data-dc="${escMedHtml(g)}"><span class="dc-dot ${color.dot}"></span>${escMedHtml(g)} (${dcGroups[g].count})</button>`;
                });
            }
            html += `<button class="med-filter-chip ${medsState.filters.preservativeFree?'active':''}" onclick="toggleMedFilter('preservativeFree')">Preservative-free</button>`;
            html += `</div></div>`;

            // Route filter chips
            const routes = {};
            allMeds.forEach(m => { const r = m.route || 'topical'; routes[r] = (routes[r]||0) + 1; });
            const routeKeys = Object.keys(routes);
            if (routeKeys.length > 1) {
                const routeLabels = { topical:'<i class="ph-duotone ph-drop"></i> Topical', oral:'<i class="ph-duotone ph-pill"></i> Oral', intravitreal:'<i class="ph-duotone ph-syringe"></i> Injection', nasal:'<i class="ph-duotone ph-wind"></i> Nasal', insert:'<i class="ph-duotone ph-square"></i> Insert' };
                const routeOrder = ['topical','oral','intravitreal','nasal','insert'];
                html += `<div class="med-subcondition-section"><div class="med-subcondition-label">Route</div><div class="med-filter-chips">`;
                html += `<button class="med-filter-chip ${medsState.filters.route===null?'active':''}" onclick="toggleMedRoute(null)">All</button>`;
                routeOrder.forEach(r => {
                    if (routes[r]) {
                        html += `<button class="med-filter-chip ${medsState.filters.route===r?'active':''}" onclick="toggleMedRoute('${r}')">${routeLabels[r]||r} (${routes[r]})</button>`;
                    }
                });
                html += `</div></div>`;
            }

            html += `</div>`;

            // Medication list
            const filtered = getMedFilteredResults();
            html += `<div class="results-header" style="margin-top:16px"><div><div class="results-count">${filtered.length} Medication${filtered.length!==1?'s':''}</div></div></div>`;
            if (filtered.length === 0) {
                html += `<div class="empty"><div class="empty-icon"><i class="ph-duotone ph-pill"></i></div><div class="empty-title">No medications match</div><div class="empty-desc">Try adjusting your filters</div></div>`;
            } else {
                html += `<div class="lens-list">`;
                filtered.forEach(med => { html += renderMedCard(med, true); });
                html += `</div>`;
            }
            return html;
        }

        function getMedFilteredResults() {
            const group = MED_CONDITION_GROUPS.find(g => g.id === medsState.selectedConditionGroup);
            if (!group) return [];
            let results = MEDS.filter(m => group.conditions.includes(m.condition));
            if (medsState.categorySearch.trim()) {
                const q = medsState.categorySearch.trim().toLowerCase();
                results = results.filter(m =>
                    m.brand_name.toLowerCase().includes(q) ||
                    m.generic_name.toLowerCase().includes(q) ||
                    m.drug_class.toLowerCase().includes(q)
                );
            }
            if (medsState.filters.subCondition) {
                results = results.filter(m => m.condition === medsState.filters.subCondition);
            }
            if (medsState.filters.drugClass) {
                results = results.filter(m => drugClassGroup(m.drug_class) === medsState.filters.drugClass);
            }
            if (medsState.filters.genericOnly) {
                results = results.filter(m => m.generic_available);
            }
            if (medsState.filters.preservativeFree) {
                results = results.filter(m => m.preservative_free);
            }
            if (medsState.filters.route) {
                results = results.filter(m => (m.route || 'topical') === medsState.filters.route);
            }
            // Sort by cheapest effective price
            results.sort((a, b) => {
                const pa = a.avg_generic_price || a.avg_brand_price;
                const pb = b.avg_generic_price || b.avg_brand_price;
                return pa - pb;
            });
            return results;
        }

        // === Shared Med Card ===

        function renderMedCard(med, condensed) {
            const isFav = medsState.favorites.includes(med.id);
            const isExpanded = medsState.expandedCards[med.id];
            const condInfo = MED_CONDITIONS[med.condition];

            const dcColor = getDrugClassColor(med.drug_class);
            let html = `<div class="med-card ${condensed ? 'med-card-condensed' : ''} ${isExpanded ? 'expanded' : ''}" ${condensed ? 'onclick="toggleMedExpand(\''+med.id+'\')"' : ''}>`;
            html += `<div class="tier-stripe" style="background:${getDrugClassHex(med.drug_class)}"></div>`;

            // Top row: info + prices + fav button
            html += `<div class="med-top-row">`;
            html += `<div class="med-info">`;
            // Badges
            html += `<div class="badges">`;
            html += `<span class="badge badge-condition">${condInfo ? condInfo.label : med.condition}</span>`;
            if (med.preservative_free) html += `<span class="badge badge-pf">PF</span>`;
            if (med.generic_available) html += `<span class="badge badge-generic">Generic</span>`;
            html += `</div>`;
            // Names
            html += `<div class="med-brand-name">${escMedHtml(med.brand_name)}</div>`;
            const isCombo = /combination/i.test(med.drug_class) && !/antibiotic|steroid|cortico/i.test(med.drug_class);
            html += `<div class="med-generic-name">${escMedHtml(med.generic_name)}${isCombo ? ' <span style="font-size:10px;font-weight:600;color:#94a3b8;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);padding:1px 5px;border-radius:4px;margin-left:4px">COMBO</span>' : ''}</div>`;
            html += `<div class="med-drug-class">${escMedHtml(med.drug_class)}</div>`;
            html += `</div>`;
            // Prices (right side)
            const ps = med.price_size ? ` <span style="font-size:11px;font-weight:400;color:#9ca3af">/${escMedHtml(med.price_size)}</span>` : '';
            html += `<div class="med-price-side">`;
            html += `<div class="med-price-col"><div class="med-price-label">Brand</div><div class="med-price-value">$${formatMedPrice(med.avg_brand_price)}${ps}</div></div>`;
            if (med.avg_generic_price !== null) {
                const savings = Math.round((1 - med.avg_generic_price / med.avg_brand_price) * 100);
                html += `<div class="med-price-col"><div class="med-price-label">Generic</div><div class="med-price-value">$${formatMedPrice(med.avg_generic_price)}${ps}</div>`;
                if (savings > 0) html += `<div class="med-price-savings">Save ${savings}%</div>`;
                html += `</div>`;
            } else {
                html += `<div class="med-price-col"><div class="med-price-label">Generic</div><div class="med-price-value" style="color:var(--ink-muted);font-size:12px">N/A</div></div>`;
            }
            html += `</div>`;
            // Fav button
            html += `<button class="med-fav-btn ${isFav?'favorited':''}" onclick="event.stopPropagation();toggleMedFavorite('${med.id}')" title="${isFav?'Remove from favorites':'Add to favorites'}"><i class="ph-duotone ph-star"></i></button>`;
            html += `</div>`;

            if (condensed) {
                html += `<div class="med-expand-hint">Tap for details</div>`;
            }

            // Expanded content
            html += `<div class="${condensed ? 'med-expanded-content' : ''}">`;

            // Dosing
            html += `<div class="med-dosing"><span class="med-dosing-label">Dosing: </span>${escMedHtml(med.typical_dosing)}</div>`;
            html += `<div class="med-bottle">Size: ${escMedHtml(med.bottle_size)}</div>`;

            // Notes — always shown
            if (med.notes) {
                const bullets = med.notes.split('. ').map(s => s.replace(/\.$/,'')).filter(s => s.trim());
                if (bullets.length > 1) {
                    html += `<ul class="med-notes-list">${bullets.map(b => `<li>${escMedHtml(b)}</li>`).join('')}</ul>`;
                } else {
                    html += `<div class="med-notes-content">${escMedHtml(med.notes)}</div>`;
                }
            }

            html += `</div>`; // end expanded content
            html += `</div>`; // end med-card
            return html;
        }

        function formatMedPrice(price) {
            if (price === null || price === undefined) return 'N/A';
            return price % 1 === 0 ? price.toLocaleString() : price.toFixed(2);
        }

        function getDrugClassHex(dc) {
            const d = dc.toLowerCase();
            if (/cai.*beta/i.test(d)) return '#0047AB';
            if (/cai.*alpha/i.test(d)) return '#8BA888';
            if (/alpha.*beta/i.test(d)) return '#003366';
            if (/rock.*prostaglandin/i.test(d)) return '#C0C0C0';
            if (/prostaglandin/.test(d)) return '#2dd4bf';
            if (/beta.blocker/.test(d)) return '#eab308';
            if (/carbonic anhydrase|^cai/.test(d)) return '#f97316';
            if (/alpha/.test(d)) return '#a855f7';
            if (/rho kinase|rock/.test(d)) return '#6b7280';
            if (/miotic|parasympathomimetic/.test(d)) return '#16a34a';
            if (/combination|aminoglycoside/.test(d)) return '#1e3a8a';
            if (/artificial tear|lubricant|lipid/.test(d)) return '#3b82f6';
            if (/fluoroquinolone/.test(d)) return '#ef4444';
            if (/macrolide/.test(d)) return '#ec4899';
            if (/antiviral/.test(d)) return '#8b5cf6';
            if (/antifungal/.test(d)) return '#78716c';
            if (/corticosteroid/.test(d)) return '#f97316';
            if (/nsaid/.test(d)) return '#eab308';
            if (/antihistamine|mast cell/.test(d)) return '#a855f7';
            if (/anti.vegf|bispecific/.test(d)) return '#0ea5e9';
            if (/cycloplegic|mydriatic/.test(d)) return '#16a34a';
            if (/parasiticide|isoxazoline/.test(d)) return '#6366f1';
            if (/immunomodulator|calcineurin/.test(d)) return '#2dd4bf';
            if (/lfa/.test(d)) return '#2dd4bf';
            if (/nicotinic/.test(d)) return '#2dd4bf';
            return '#9ca3af';
        }

        function getDrugClassColor(dc) {
            const d = dc.toLowerCase();
            if (/combination/.test(d) && !/antibiotic|steroid|cortico/i.test(d)) return { cls: 'dc-combo', dot: 'dc-dot-combo', order: 7 };
            if (/prostaglandin/.test(d)) return { cls: 'dc-pga', dot: 'dc-dot-pga', order: 1 };
            if (/beta.*(blocker|selective)/.test(d)) return { cls: 'dc-beta', dot: 'dc-dot-beta', order: 2 };
            if (/carbonic anhydrase|^cai/.test(d)) return { cls: 'dc-cai', dot: 'dc-dot-cai', order: 3 };
            if (/alpha.*agonist/.test(d)) return { cls: 'dc-alpha', dot: 'dc-dot-alpha', order: 4 };
            if (/rho kinase|rock/.test(d)) return { cls: 'dc-rock', dot: 'dc-dot-rock', order: 5 };
            if (/miotic|cholinergic|parasympathomimetic/.test(d)) return { cls: 'dc-miotic', dot: 'dc-dot-miotic', order: 6 };
            if (/fluoroquinolone/.test(d)) return { cls: 'dc-abx', dot: 'dc-dot-abx', order: 8 };
            if (/aminoglycoside(?!.*steroid|.*cortico)/.test(d)) return { cls: 'dc-abx', dot: 'dc-dot-abx', order: 8 };
            if (/macrolide/.test(d)) return { cls: 'dc-abx', dot: 'dc-dot-abx', order: 8 };
            if (/penicillin|cephalosporin|sulfonamide|tetracycline/.test(d)) return { cls: 'dc-abx', dot: 'dc-dot-abx', order: 8 };
            if (/antihistamine|mast cell/.test(d)) return { cls: 'dc-hist', dot: 'dc-dot-hist', order: 9 };
            if (/corticosteroid|steroid/.test(d)) return { cls: 'dc-steroid', dot: 'dc-dot-steroid', order: 10 };
            if (/nsaid/.test(d)) return { cls: 'dc-nsaid', dot: 'dc-dot-nsaid', order: 11 };
            if (/antiviral/.test(d)) return { cls: 'dc-viral', dot: 'dc-dot-viral', order: 12 };
            if (/anti-vegf/.test(d)) return { cls: 'dc-vegf', dot: 'dc-dot-vegf', order: 13 };
            if (/immunomodulator|calcineurin/.test(d)) return { cls: 'dc-immuno', dot: 'dc-dot-immuno', order: 14 };
            if (/artificial tear|lubricant|lipid/.test(d)) return { cls: 'dc-tear', dot: 'dc-dot-tear', order: 15 };
            if (/antifungal/.test(d)) return { cls: 'dc-fungal', dot: 'dc-dot-fungal', order: 16 };
            if (/combination|combo/.test(d)) return { cls: 'dc-combo', dot: 'dc-dot-combo', order: 7 };
            return { cls: '', dot: '', order: 99 };
        }

        function shortenDrugClass(dc) {
            return dc
                .replace(/ \(topical\)/i, '')
                .replace(/ \(low potency\)/i, '')
                .replace(/ \(moderate potency\)/i, '')
                .replace(/ \(low-moderate potency\)/i, '')
                .replace(/ \(high potency\)/i, '')
                .replace(/ \(low dose\)/i, '')
                .replace(/ \(long-acting\)/i, '')
                .replace(/ \(oral nucleoside analog\)/i, ' (oral)')
                .replace(/ \(nucleoside analog\)/i, '')
                .replace(/ \(polyene\)/i, '')
                .replace(/ \(sympathomimetic\)/i, '')
                .replace(/ \(2nd generation\)/i, '')
                .replace(/ \(4th generation\)/i, '')
                .replace(/Calcineurin inhibitor \/ Immunomodulator/i, 'Immunomodulator')
                .replace(/Aminoglycoside antibiotic \/ Corticosteroid combination/i, 'Antibiotic / Steroid')
                .replace(/Combination antibiotic \/ Corticosteroid/i, 'Antibiotic / Steroid')
                .replace(/Antihistamine \/ Mast cell stabilizer/i, 'Antihistamine / Mast cell')
                .replace(/Alpha-2 adrenergic agonist/i, 'Alpha-2 agonist')
                .replace(/Carbonic anhydrase inhibitor/i, 'CAI')
                .replace(/Nicotinic acetylcholine receptor agonist/i, 'nAChR agonist')
                .replace(/Lipid-enhanced artificial tear/i, 'Lipid-enhanced tear')
                .replace(/Lipid-based artificial tear/i, 'Lipid-based tear')
                .replace(/Artificial tear \/ Lubricant/i, 'Artificial tear')
                .replace(/Bispecific anti-VEGF \/ anti-Ang-2/i, 'Anti-VEGF / Ang-2')
                .replace(/Cycloplegic \/ Mydriatic/i, 'Cycloplegic / Mydriatic')
                .replace(/Mydriatic \/ Short-acting cycloplegic/i, 'Short-acting mydriatic')
                .replace(/Miotic \/ Parasympathomimetic/i, 'Miotic');
        }

        // Groups granular drug_class strings into broader chip categories
        function drugClassGroup(dc) {
            const d = dc.toLowerCase();
            if (/combination/.test(d) && !/antibiotic|steroid|cortico/i.test(d)) return "Combination";
            if (/prostaglandin/.test(d)) return "Prostaglandin";
            if (/beta.*(blocker|selective)/.test(d)) return "Beta-blocker";
            if (/carbonic anhydrase|^cai/i.test(d)) return "CAI";
            if (/alpha.*agonist/.test(d) && !/low dose/.test(d)) return "Alpha agonist";
            if (/rho kinase|rock/i.test(d)) return "ROCK inhibitor";
            if (/cholinergic|miotic|parasympathomimetic/i.test(d)) return "Miotic";
            if (/fluoroquinolone/i.test(d)) return "Fluoroquinolone";
            if (/aminoglycoside(?! .*steroid| .*cortico)/i.test(d)) return "Aminoglycoside";
            if (/macrolide/i.test(d)) return "Macrolide";
            if (/polypeptide|triple antibiotic|combination antibiotic|double antibiotic/i.test(d) && !/steroid|cortico/i.test(d)) return "Other antibiotic";
            if (/antihistamine|mast cell/i.test(d)) return "Antihistamine";
            if (/corticosteroid.*combination|antibiotic.*cortico|aminoglycoside.*cortico|sulfonamide.*cortico/i.test(d)) return "Antibiotic / Steroid";
            if (/corticosteroid|steroid/i.test(d)) return "Steroid";
            if (/nsaid/i.test(d)) return "NSAID";
            if (/anti-vegf/i.test(d)) return "Anti-VEGF";
            if (/antiviral/i.test(d)) return "Antiviral";
            if (/antifungal/i.test(d)) return "Antifungal";
            if (/parasiticide|isoxazoline/i.test(d)) return "Parasiticide";
            if (/artificial tear|lubricant|lipid/i.test(d)) return "Artificial tear";
            if (/immunomodulator|calcineurin/i.test(d)) return "Immunomodulator";
            if (/cycloplegic|mydriatic/i.test(d)) return "Cycloplegic / Mydriatic";
            if (/penicillin|cephalosporin|sulfonamide.*oral|tetracycline/i.test(d)) return "Oral antibiotic";
            if (/opioid|analgesic/i.test(d)) return "Analgesic";
            return shortenDrugClass(dc);
        }

        function escMedHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // === Navigation ===

        function goMedStep(i) {
            if (i < medsState.paStep) {
                medsState.paStep = i;
                renderMeds();
            }
        }

        function goMedNext() {
            if (medsState.paStep === 0 && medsState.selectedConditionGroup !== null) {
                medsState.paStep = 1;
            }
            renderMeds();
        }

        function goMedBack() {
            if (medsState.paStep > 0) {
                medsState.paStep = 0;
                medsState.categorySearch = "";
                renderMeds();
            }
        }

        function selectMedCondition(groupId) {
            medsState.selectedConditionGroup = groupId;
            medsState.filters = { genericOnly:false, preservativeFree:false, drugClass:null, subCondition:null, route:null };
            medsState.categorySearch = "";
            medsState.paStep = 1;
            renderMeds();
        }

        function toggleMedFilter(key) {
            medsState.filters[key] = !medsState.filters[key];
            renderMeds();
        }

        function toggleMedSubCondition(condId) {
            medsState.filters.subCondition = medsState.filters.subCondition === condId ? null : condId;
            renderMeds();
        }

        function toggleMedDrugClass(dc) {
            medsState.filters.drugClass = medsState.filters.drugClass === dc ? null : dc;
            renderMeds();
        }

        function toggleMedRoute(route) {
            medsState.filters.route = medsState.filters.route === route ? null : route;
            renderMeds();
        }

        function toggleMedExpand(medId) {
            medsState.expandedCards[medId] = !medsState.expandedCards[medId];
            renderMeds();
        }

        function toggleMedNotes(medId) {
            medsState.expandedNotes[medId] = !medsState.expandedNotes[medId];
            renderMeds();
        }

        // === Events ===

        let medAcIndex = -1;

        function bindMedEvents() {
            const input = document.getElementById('medSearchInput');
            if (input) {
                input.addEventListener('input', handleMedSearch);
                input.addEventListener('keydown', handleMedSearchKeydown);
                input.addEventListener('focus', function() { if (this.value.length >= 2) updateMedAutocomplete(); });
            }
            const catSearch = document.getElementById('medCategorySearch');
            if (catSearch) {
                catSearch.addEventListener('input', function(e) {
                    medsState.categorySearch = e.target.value;
                    renderMeds();
                });
            }

            document.addEventListener('click', function(e) {
                const ac = document.getElementById('medAutocomplete');
                const input = document.getElementById('medSearchInput');
                if (ac && input && !ac.contains(e.target) && e.target !== input) {
                    ac.style.display = 'none';
                }
            });
        }

        function handleMedSearch(e) {
            medsState.searchQuery = e.target.value;
            medAcIndex = -1;
            updateMedAutocomplete();
            // Update results below search
            const el = document.getElementById('medsContent');
            if (el) renderMeds();
        }

        function handleMedSearchKeydown(e) {
            const ac = document.getElementById('medAutocomplete');
            if (!ac || ac.style.display === 'none') return;
            const items = ac.querySelectorAll('.med-autocomplete-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                medAcIndex = Math.min(medAcIndex + 1, items.length - 1);
                highlightAcItem(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                medAcIndex = Math.max(medAcIndex - 1, -1);
                highlightAcItem(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (medAcIndex >= 0 && items[medAcIndex]) {
                    items[medAcIndex].click();
                } else {
                    ac.style.display = 'none';
                }
            } else if (e.key === 'Escape') {
                ac.style.display = 'none';
                medAcIndex = -1;
            }
        }

        function highlightAcItem(items) {
            items.forEach((it, i) => it.classList.toggle('highlighted', i === medAcIndex));
        }

        function updateMedAutocomplete() {
            const ac = document.getElementById('medAutocomplete');
            if (!ac) return;
            const matches = getMedAutocomplete(medsState.searchQuery);
            if (matches.length === 0) {
                ac.style.display = 'none';
                return;
            }
            ac.style.display = '';
            ac.innerHTML = matches.map((m, i) => {
                return `<div class="med-autocomplete-item ${i===medAcIndex?'highlighted':''}" onclick="selectMedFromAutocomplete('${m.id}')">
                    <div class="ac-brand">${highlightMatch(m.brand_name, medsState.searchQuery)}</div>
                    <div class="ac-generic">${highlightMatch(m.generic_name, medsState.searchQuery)}</div>
                </div>`;
            }).join('');
        }

        function highlightMatch(text, query) {
            if (!query || query.length < 2) return escMedHtml(text);
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return escMedHtml(text);
            const before = text.slice(0, idx);
            const match = text.slice(idx, idx + query.length);
            const after = text.slice(idx + query.length);
            return escMedHtml(before) + '<span class="med-ac-match">' + escMedHtml(match) + '</span>' + escMedHtml(after);
        }

        function selectMedFromAutocomplete(medId) {
            const med = MEDS.find(m => m.id === medId);
            if (med) {
                medsState.searchQuery = med.brand_name;
                medAcIndex = -1;
                renderMeds();
            }
        }

        // === Favorites ===

        function toggleMedFavorite(medId) {
            const idx = medsState.favorites.indexOf(medId);
            if (idx >= 0) {
                medsState.favorites.splice(idx, 1);
            } else {
                medsState.favorites.push(medId);
            }
            localStorage.setItem('medFavorites', JSON.stringify(medsState.favorites));
            renderMeds();
        }

        function toggleMedFavoritesOnly() {
            medsState.showFavoritesOnly = !medsState.showFavoritesOnly;
            renderMeds();
        }

        // === Copy Rx ===

        function copyMedRx(medId) {
            const med = MEDS.find(m => m.id === medId);
            if (!med) return;
            let text = med.brand_name;
            text += '\n' + med.generic_name;
            text += '\nDosing: ' + med.typical_dosing;
            text += '\nSize: ' + med.bottle_size;
            if (med.notes) text += '\nNotes: ' + med.notes;

            const btn = document.getElementById('copyBtn_' + medId);
            const onSuccess = () => {
                if (btn) {
                    btn.classList.add('copied');
                    btn.innerHTML = '<i class="ph-duotone ph-check"></i> Copied';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<i class="ph-duotone ph-clipboard-text"></i> Copy Rx';
                    }, 2000);
                }
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
                    fallbackCopyMed(text);
                    onSuccess();
                });
            } else {
                fallbackCopyMed(text);
                onSuccess();
            }
        }

        function fallbackCopyMed(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        // INIT
        render();
    </script>
</body>
</html>
